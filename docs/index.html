<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
        }

        /* Боковое меню */
        .layout {
            display: flex;
        }

        .sidebar {
            width: 240px;
            position: fixed;
            top: 56px;
            bottom: 0;
            background: #0f0f0f;
            padding: 12px 0;
            overflow-y: auto;
            z-index: 10;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 8px 24px;
            cursor: pointer;
            border-radius: 10px;
            margin: 2px 8px;
            color: #ffffff;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            background: #272727;
        }

        .sidebar-item.active {
            background: #272727;
        }

        .sidebar-item span:first-child {
            font-size: 1.5rem;
            width: 24px;
        }

        .sidebar-item span:last-child {
            font-size: 0.9rem;
        }

        .sidebar-divider {
            height: 1px;
            background: #3f3f3f;
            margin: 12px 12px;
        }

        .sidebar-title {
            color: #aaaaaa;
            font-size: 0.8rem;
            padding: 8px 24px;
            letter-spacing: 1px;
        }

        /* Основной контент */
        .main-content {
            flex: 1;
            margin-left: 240px;
            padding-top: 56px;
        }

        /* Шапка */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #3f3f3f;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .menu-btn:hover {
            background: #272727;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 4px;
            text-decoration: none;
        }

        .logo-lets {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }

        .logo-figure {
            font-size: 1rem;
            color: #aaaaaa;
        }

        .logo-it {
            font-size: 0.95rem;
            color: #888888;
        }

        .logo-fiohub {
            font-size: 0.75rem;
            color: #ff0000;
            margin-left: 4px;
        }

        .search-area {
            flex: 1;
            max-width: 600px;
            margin: 0 32px;
            display: flex;
        }

        .search-input {
            flex: 1;
            padding: 10px 16px;
            background: #121212;
            border: 1px solid #3f3f3f;
            border-radius: 40px 0 0 40px;
            color: white;
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .search-btn {
            padding: 10px 24px;
            background: #272727;
            border: 1px solid #3f3f3f;
            border-left: none;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
            color: white;
        }

        .search-btn:hover {
            background: #3f3f3f;
        }

        .user-area {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .icon-btn:hover {
            background: #272727;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Контент */
        .content {
            padding: 24px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 16px;
            background: #272727;
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tab.active {
            background: white;
            color: #0f0f0f;
        }

        .tab:hover {
            background: #3f3f3f;
        }

        /* Сетка видео */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .video-card {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .video-info {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .video-details h3 {
            font-size: 1rem;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-details p {
            font-size: 0.8rem;
            color: #aaaaaa;
            margin-bottom: 2px;
        }

        .video-stats {
            font-size: 0.75rem;
            color: #aaaaaa;
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #aaaaaa;
        }

        .btn-upload {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 16px;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
            }
            .search-area {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="layout">
    <!-- Боковое меню -->
    <aside class="sidebar">
        <div class="sidebar-item active">
            <span>🏠</span><span>Главная</span>
        </div>
        <div class="sidebar-item">
            <span>🔥</span><span>Shorts</span>
        </div>
        <div class="sidebar-item">
            <span>📺</span><span>Подписки</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-title">Вам может понравиться</div>
        <div class="sidebar-item">
            <span>🎬</span><span>Let's FioHub</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-title">Подписки</div>
        <div class="sidebar-item">
            <span>👤</span><span>Topchiy Dev</span>
        </div>
        <div class="sidebar-item">
            <span>🎥</span><span>Кинокомпания</span>
        </div>
        <div class="sidebar-item">
            <span>🎸</span><span>Сектор Газа</span>
        </div>
        <div class="sidebar-item">
            <span>🎤</span><span>Михаил Круг</span>
        </div>
    </aside>

    <!-- Основной контент -->
    <div class="main-content">
        <!-- Шапка -->
        <header class="header">
            <div class="logo-area">
                <button class="menu-btn">☰</button>
                <a href="/letsfiohub" class="logo">
                    <span class="logo-lets">Let's</span>
                    <span class="logo-figure">figure</span>
                    <span class="logo-it">it out</span>
                    <span class="logo-fiohub">FioHub</span>
                </a>
            </div>

            <div class="search-area">
                <input type="text" class="search-input" placeholder="Поиск...">
                <button class="search-btn">🔍</button>
            </div>

            <div class="user-area">
                <button class="icon-btn">📤</button>
                <button class="icon-btn">🔔</button>
                <div class="avatar">U</div>
            </div>
        </header>

        <!-- Контент -->
        <div class="content">
            <div class="tabs">
                <button class="tab active">📺 Все видео</button>
                <button class="tab">🔥 Тренды</button>
                <button class="tab">👍 Рекомендации</button>
            </div>

            <div id="videos-container">
                <div class="empty-state">⏳ Загрузка видео...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://letsfiohub-api.onrender.com';
    let allVideos = [];
    let currentTab = 'all';

    async function loadVideos() {
        const container = document.getElementById('videos-container');
        
        try {
            const response = await fetch(`${API_URL}/api/v1/videos`);
            const data = await response.json();
            allVideos = data.videos || [];
            renderVideos();
        } catch (err) {
            container.innerHTML = `<div class="empty-state"><p>❌ Сервер просыпается...</p><button class="btn-upload" onclick="loadVideos()">Повторить</button></div>`;
        }
    }

    function renderVideos() {
        const container = document.getElementById('videos-container');
        let videos = [...allVideos];
        
        if (currentTab === 'trending') {
            videos.sort((a, b) => (b.views || 0) - (a.views || 0));
        } else if (currentTab === 'recommended') {
            videos.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        }
        
        if (videos.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>📭 Пока нет видео</p>
                    <button class="btn-upload" onclick="window.open('${API_URL}/docs', '_blank')">📤 Загрузить видео</button>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="videos-grid">
                ${videos.map(video => `
                    <div class="video-card" onclick="openVideo('${video.id}')">
                        <div class="thumbnail">🎬</div>
                        <div class="video-info">
                            <div class="channel-avatar">📺</div>
                            <div class="video-details">
                                <h3>${escapeHtml(video.title) || 'Без названия'}</h3>
                                <p>Let's FioHub</p>
                                <div class="video-stats">
                                    <span>👁️ ${formatViews(video.views || 0)}</span>
                                    <span>❤️ ${video.likes || 0}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function formatViews(views) {
        if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M';
        if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
        return views;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function openVideo(videoId) {
        window.location.href = `/letsfiohub/watch.html?id=${videoId}`;
    }
    
    // Вкладки
    document.querySelectorAll('.tab').forEach((tab, index) => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabs = ['all', 'trending', 'recommended'];
            currentTab = tabs[index];
            renderVideos();
        });
    });
    
    // Поиск
    document.querySelector('.search-btn').addEventListener('click', () => {
        const query = document.querySelector('.search-input').value.toLowerCase();
        if (query) {
            const filtered = allVideos.filter(v => 
                v.title?.toLowerCase().includes(query)
            );
            const container = document.getElementById('videos-container');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">🔍 Ничего не найдено</div>';
            } else {
                container.innerHTML = `
                    <div class="videos-grid">
                        ${filtered.map(video => `
                            <div class="video-card" onclick="openVideo('${video.id}')">
                                <div class="thumbnail">🎬</div>
                                <div class="video-info">
                                    <div class="channel-avatar">📺</div>
                                    <div class="video-details">
                                        <h3>${escapeHtml(video.title)}</h3>
                                        <p>Let's FioHub</p>
                                        <div class="video-stats">
                                            <span>👁️ ${formatViews(video.views || 0)}</span>
                                            <span>❤️ ${video.likes || 0}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }
    });
    
    loadVideos();
</script>

</body>
</html>
