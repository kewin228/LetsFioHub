<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub — видеохостинг</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #f1f1f1; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #0f0f0f; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; border-bottom: 1px solid #303030; }
        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo-icon { font-size: 28px; }
        .logo-text { font-weight: bold; background: linear-gradient(135deg, #fff, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-form { flex: 1; max-width: 600px; margin: 0 32px; display: flex; }
        .search-input { flex: 1; padding: 10px 16px; background: #121212; border: 1px solid #303030; border-radius: 40px 0 0 40px; color: white; }
        .search-btn { background: #222; border: 1px solid #303030; border-left: none; border-radius: 0 40px 40px 0; padding: 0 20px; cursor: pointer; color: white; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .icon-btn:hover { background: #272727; }
        .sidebar { position: fixed; top: 56px; bottom: 0; left: 0; width: 240px; background: #0f0f0f; padding: 12px 0; overflow-y: auto; transition: transform 0.3s; }
        .sidebar.closed { transform: translateX(-240px); }
        .sidebar-item { display: flex; align-items: center; gap: 24px; padding: 8px 24px; cursor: pointer; border-radius: 10px; margin: 2px 8px; }
        .sidebar-item:hover { background: #272727; }
        .sidebar-item.active { background: #272727; }
        .main-content { margin-left: 240px; margin-top: 56px; padding: 24px; transition: margin-left 0.3s; }
        .main-content.expanded { margin-left: 0; }
        .chips { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .chip { padding: 8px 16px; background: #272727; border: none; border-radius: 40px; color: white; cursor: pointer; }
        .chip.active { background: white; color: #0f0f0f; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .video-card { cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #2a2a2a, #1a1a1a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 8px; }
        .video-details { display: flex; gap: 12px; margin-top: 8px; }
        .channel-avatar { width: 36px; height: 36px; background: #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .video-info h3 { font-size: 16px; margin-bottom: 4px; }
        .video-info p { font-size: 14px; color: #aaa; }
        .video-stats { font-size: 12px; color: #aaa; display: flex; gap: 8px; margin-top: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #272727; padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; background: #121212; border: 1px solid #3f3f3f; border-radius: 8px; color: white; }
        .modal-content button { background: #ff0000; color: white; border: none; padding: 12px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 16px; }
        .close-modal { float: right; font-size: 24px; cursor: pointer; color: #aaa; }
        .empty-state { text-align: center; padding: 60px; color: #aaa; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-240px); } .main-content { margin-left: 0; } .search-form { display: none; } }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-left">
            <button class="icon-btn" id="menuToggle">☰</button>
            <div class="logo" id="logoHome">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">Let's FioHub</span>
            </div>
        </div>
        <div class="search-form">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="uploadBtn" style="display: none;">📤</button>
            <button class="icon-btn" id="loginBtn">👤</button>
            <button class="icon-btn" id="logoutBtn" style="display: none;">🚪</button>
        </div>
    </header>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-item active" data-page="home"><span>🏠</span><span>Главная</span></div>
        <div class="sidebar-item" data-page="my-channel"><span>📺</span><span>Мой канал</span></div>
        <div class="sidebar-divider" style="height:1px; background:#303030; margin:12px 12px;"></div>
        <div class="sidebar-item" data-page="subscriptions"><span>⭐</span><span>Подписки</span></div>
    </aside>
    <main class="main-content" id="mainContent"><div id="content"></div></main>
</div>
<div id="authModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><h2 id="authTitle">Вход</h2><form id="authForm"><input type="text" id="authUsername" placeholder="Имя" style="display:none"><input type="email" id="authEmail" placeholder="Email" required><input type="password" id="authPassword" placeholder="Пароль" required><button type="submit" id="authSubmitBtn">Войти</button></form><p style="margin-top:16px; text-align:center"><span id="authSwitchText">Нет аккаунта?</span> <button id="authSwitchBtn" style="background:none; border:none; color:#ff0000; cursor:pointer">Регистрация</button></p></div></div>
<div id="uploadModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><h2>📤 Загрузить видео</h2><form id="uploadForm"><input type="text" id="videoTitle" placeholder="Название" required><textarea id="videoDescription" rows="3" placeholder="Описание"></textarea><input type="file" id="videoFile" accept="video/*" required><div class="progress-bar" style="display:none; height:4px; background:#3f3f3f; margin-top:12px"><div class="progress-fill" style="width:0%; height:100%; background:#ff0000"></div></div><div id="uploadStatus"></div><button type="submit">📤 Загрузить</button></form></div></div>
<script>
const API_URL='https://letsfiohub-api.onrender.com';let token=localStorage.getItem('token');let currentUser=null;let allVideos=[];let currentTab='all';let currentPage='home';
const uploadBtn=document.getElementById('uploadBtn');const loginBtn=document.getElementById('loginBtn');const logoutBtn=document.getElementById('logoutBtn');const contentDiv=document.getElementById('content');
async function loadCurrentUser(){if(!token)return;try{const r=await fetch(API_URL+'/api/me',{headers:{'Authorization':'Bearer '+token}});if(r.ok){currentUser=await r.json();updateAuthUI()}else logout()}catch(e){}}
function updateAuthUI(){if(token&&currentUser){uploadBtn.style.display='flex';loginBtn.style.display='none';logoutBtn.style.display='flex'}else{uploadBtn.style.display='none';loginBtn.style.display='flex';logoutBtn.style.display='none'}}
async function register(u,e,p){const r=await fetch(API_URL+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:e,password:p})});if(!r.ok)throw new Error(await r.text());return await r.json()}
async function login(e,p){const r=await fetch(API_URL+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});if(!r.ok)throw new Error('Invalid');const d=await r.json();token=d.access_token;currentUser=d.user;localStorage.setItem('token',token);updateAuthUI();return true}
function logout(){token=null;currentUser=null;localStorage.removeItem('token');updateAuthUI();loadHomePage()}
async function loadAllVideos(){try{const r=await fetch(API_URL+'/api/videos');const d=await r.json();allVideos=d.videos||[]}catch(e){}}
function renderVideosGrid(videos){if(!videos||videos.length===0)return'<div class="empty-state">📭 Пока нет видео</div>';return'<div class="video-grid">'+videos.map(v=>'<div class="video-card" onclick="openVideo(\''+v.id+'\')"><div class="thumbnail">🎬</div><div class="video-details"><div class="channel-avatar">📺</div><div class="video-info"><h3>'+escapeHtml(v.title)+'</h3><p>'+escapeHtml(v.uploader_name)+'</p><div class="video-stats"><span>👁️ '+(v.views||0)+'</span><span>❤️ '+(v.likes||0)+'</span></div></div></div></div>').join('')+'</div>'}
function renderChips(){const chips=['Все видео','Тренды','Рекомендации'];const tabs=['all','trending','recommended'];return'<div class="chips">'+chips.map((c,i)=>'<button class="chip '+(currentTab===tabs[i]?'active':'')+'" data-tab="'+tabs[i]+'">'+c+'</button>').join('')+'</div>'}
async function loadHomePage(){await loadAllVideos();let v=[...allVideos];if(currentTab==='trending')v.sort((a,b)=>(b.views||0)-(a.views||0));if(currentTab==='recommended')v.sort((a,b)=>(b.likes||0)-(a.likes||0));contentDiv.innerHTML=renderChips()+renderVideosGrid(v);document.querySelectorAll('.chip').forEach(c=>{c.addEventListener('click',e=>{currentTab=e.target.dataset.tab;loadHomePage()})})}
async function loadMyChannel(){if(!currentUser){document.getElementById('authModal').style.display='flex';return}const r=await fetch(API_URL+'/api/channel/'+currentUser.username);if(r.ok){const d=await r.json();contentDiv.innerHTML=renderVideosGrid(d.videos||[])}}else contentDiv.innerHTML='<div class="empty-state">Ошибка загрузки</div>'}
function loadSubscriptions(){contentDiv.innerHTML='<div class="empty-state">⭐ Подписки — скоро здесь появятся новые видео</div>'}
async function renderPage(){if(currentPage==='home')await loadHomePage();else if(currentPage==='my-channel')await loadMyChannel();else if(currentPage==='subscriptions')loadSubscriptions()}
window.openVideo=function(id){window.location.href='/letsfiohub/watch.html?id='+id}
function escapeHtml(t){if(!t)return '';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
async function searchVideos(){const q=document.getElementById('searchInput').value.toLowerCase();if(!q){await loadHomePage();return}const v=await loadAllVideos();const f=v.filter(v=>v.title?.toLowerCase().includes(q));if(f.length===0)contentDiv.innerHTML='<div class="empty-state">🔍 Ничего не найдено</div>';else contentDiv.innerHTML=renderVideosGrid(f)}
document.getElementById('searchBtn').addEventListener('click',searchVideos);document.getElementById('searchInput').addEventListener('keypress',e=>{if(e.key==='Enter')searchVideos()});document.getElementById('logoHome').addEventListener('click',()=>{currentPage='home';renderPage()});document.getElementById('logoutBtn').addEventListener('click',logout);
document.querySelectorAll('.sidebar-item').forEach(i=>{i.addEventListener('click',()=>{document.querySelectorAll('.sidebar-item').forEach(ii=>ii.classList.remove('active'));i.classList.add('active');const p=i.dataset.page;if(p==='home'){currentPage='home';renderPage()}else if(p==='my-channel'){currentPage='my-channel';renderPage()}else if(p==='subscriptions'){currentPage='subscriptions';renderPage()}})});
let sidebarVisible=true;document.getElementById('menuToggle').addEventListener('click',()=>{sidebarVisible=!sidebarVisible;document.getElementById('sidebar').classList.toggle('closed',!sidebarVisible);document.getElementById('mainContent').classList.toggle('expanded',!sidebarVisible)});
const authModal=document.getElementById('authModal');let isLogin=true;document.getElementById('loginBtn').onclick=()=>authModal.style.display='flex';document.querySelectorAll('.close-modal').forEach(btn=>{btn.onclick=()=>{authModal.style.display='none';document.getElementById('uploadModal').style.display='none'}});window.onclick=e=>{if(e.target===authModal)authModal.style.display='none';if(e.target===document.getElementById('uploadModal'))document.getElementById('uploadModal').style.display='none'};
document.getElementById('authSwitchBtn').onclick=()=>{isLogin=!isLogin;const t=document.getElementById('authTitle');const u=document.getElementById('authUsername');if(isLogin){t.textContent='Вход';u.style.display='none';document.getElementById('authSubmitBtn').textContent='Войти';document.getElementById('authSwitchText').textContent='Нет аккаунта?';document.getElementById('authSwitchBtn').textContent='Регистрация'}else{t.textContent='Регистрация';u.style.display='block';document.getElementById('authSubmitBtn').textContent='Зарегистрироваться';document.getElementById('authSwitchText').textContent='Уже есть аккаунт?';document.getElementById('authSwitchBtn').textContent='Войти'}};
document.getElementById('authForm').onsubmit=async(e)=>{e.preventDefault();const email=document.getElementById('authEmail').value;const password=document.getElementById('authPassword').value;try{if(isLogin){await login(email,password);authModal.style.display='none';await renderPage()}else{const username=document.getElementById('authUsername').value;await register(username,email,password);await login(email,password);authModal.style.display='none';await renderPage()}}catch(err){alert('Ошибка: '+err.message)}};
const uploadModal=document.getElementById('uploadModal');document.getElementById('uploadBtn').onclick=()=>uploadModal.style.display='flex';document.getElementById('uploadForm').onsubmit=async(e)=>{e.preventDefault();const title=document.getElementById('videoTitle').value;const desc=document.getElementById('videoDescription').value;const file=document.getElementById('videoFile').files[0];if(!title||!file)return alert('Заполните название и выберите видео');const fd=new FormData();fd.append('title',title);fd.append('description',desc);fd.append('file',file);document.getElementById('progressBar').style.display='block';try{const r=await fetch(API_URL+'/api/videos/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});if(r.ok){alert('Видео загружено!');uploadModal.style.display='none';document.getElementById('uploadForm').reset();await renderPage()}else alert('Ошибка загрузки')}catch(err){alert('Ошибка')}document.getElementById('progressBar').style.display='none'};
loadCurrentUser().then(()=>{renderPage()});
</script>
</body>
</html>
