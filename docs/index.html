<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #f1f1f1; }
        
        /* Хедер */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #303030;
        }
        .menu-btn {
            background: #272727;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
        }
        .menu-btn:hover { background: #3f3f3f; }
        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo img { height: 32px; }
        .search-form { flex: 1; max-width: 600px; margin: 0 32px; display: flex; }
        .search-input { flex: 1; padding: 10px 16px; background: #121212; border: 1px solid #303030; border-radius: 40px 0 0 40px; color: white; }
        .search-btn { background: #222; border: 1px solid #303030; border-left: none; border-radius: 0 40px 40px 0; padding: 0 20px; cursor: pointer; color: white; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .icon-btn:hover { background: #272727; }
        
        /* Боковое меню */
        .sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            bottom: 0;
            width: 260px;
            background: #0f0f0f;
            transform: translateX(-260px);
            transition: transform 0.3s ease;
            z-index: 1000;
            padding: 16px 0;
            overflow-y: auto;
            border-right: 1px solid #303030;
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 10px;
            margin: 4px 12px;
            transition: background 0.2s;
        }
        .sidebar-item:hover { background: #272727; }
        .sidebar-item.active { background: #272727; }
        .sidebar-item span:first-child { font-size: 22px; width: 28px; }
        .sidebar-divider { height: 1px; background: #303030; margin: 12px 16px; }
        
        /* Оверлей */
        .overlay {
            display: none;
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            cursor: pointer;
        }
        .overlay.active { display: block; }
        
        /* Основной контент */
        .main-content {
            margin-top: 56px;
            padding: 24px;
            min-height: calc(100vh - 56px);
        }
        
        /* Чипсы */
        .chips {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .chip {
            padding: 8px 18px;
            background: #272727;
            border: none;
            border-radius: 40px;
            color: #f1f1f1;
            cursor: pointer;
            font-size: 14px;
        }
        .chip.active { background: #f1f1f1; color: #0f0f0f; }
        
        /* Сетка видео */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-4px); }
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 12px;
        }
        .video-details { display: flex; gap: 12px; }
        .channel-avatar {
            width: 40px;
            height: 40px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-info { flex: 1; }
        .video-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .video-info p { font-size: 13px; color: #aaa; margin-bottom: 4px; }
        .video-stats { font-size: 12px; color: #aaa; display: flex; gap: 12px; }
        
        .empty-state { text-align: center; padding: 60px; color: #aaa; }
        
        @media (max-width: 768px) {
            .search-form { display: none; }
            .main-content { padding: 16px; }
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div style="display: flex; align-items: center;">
            <button class="menu-btn" id="menuToggle">☰</button>
            <div class="logo" id="logoHome"><img src="logo.png" alt="Logo"><span>Let's FioHub</span></div>
        </div>
        <div class="search-form">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
        <div>
            <button class="icon-btn" id="uploadBtn" style="display: none;">📤</button>
            <button class="icon-btn" id="loginBtn">👤</button>
            <button class="icon-btn" id="logoutBtn" style="display: none;">🚪</button>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-item active" data-page="home"><span>🏠</span><span>Главная</span></div>
        <div class="sidebar-item" data-page="quick"><span>⚡</span><span>Quick</span></div>
        <div class="sidebar-item" data-page="my-channel"><span>📺</span><span>Мой канал</span></div>
        <div class="sidebar-item" data-page="subscriptions"><span>⭐</span><span>Подписки</span></div>
        <div class="sidebar-item" data-page="history"><span>📜</span><span>История</span></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-item" data-page="subscribers-list"><span>👥</span><span>Мои подписчики</span></div>
    </aside>

    <main class="main-content" id="mainContent">
        <div id="content"></div>
    </main>
</div>

<!-- Модальное окно входа -->
<div id="authModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
    <div style="background:#1a1a1a; padding:32px; border-radius:20px; width:90%; max-width:400px;">
        <span style="float:right; font-size:28px; cursor:pointer; color:#aaa;" onclick="document.getElementById('authModal').style.display='none'">&times;</span>
        <h2 id="authTitle">Вход</h2>
        <form id="authForm">
            <input type="text" id="authUsername" placeholder="Имя" style="display:none; width:100%; padding:12px; margin:8px 0; background:#121212; border:1px solid #303030; border-radius:8px; color:white;">
            <input type="email" id="authEmail" placeholder="Email" required style="width:100%; padding:12px; margin:8px 0; background:#121212; border:1px solid #303030; border-radius:8px; color:white;">
            <input type="password" id="authPassword" placeholder="Пароль" required style="width:100%; padding:12px; margin:8px 0; background:#121212; border:1px solid #303030; border-radius:8px; color:white;">
            <button type="submit" id="authSubmitBtn" style="width:100%; padding:12px; background:#ff0000; color:white; border:none; border-radius:40px; margin-top:16px; cursor:pointer;">Войти</button>
        </form>
        <p style="margin-top:16px; text-align:center;"><span id="authSwitchText">Нет аккаунта?</span> <button id="authSwitchBtn" style="background:none; border:none; color:#ff0000; cursor:pointer;">Регистрация</button></p>
    </div>
</div>

<script>
const API_URL = 'https://letsfiohub-api.onrender.com';
let token = localStorage.getItem('token');
let currentUser = null;
let allVideos = [];
let currentPage = 'home';
let currentTab = 'all';

// Меню
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const menuBtn = document.getElementById('menuToggle');

function openMenu() {
    sidebar.classList.add('open');
    overlay.classList.add('active');
}

function closeMenu() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
}

if (menuBtn) {
    menuBtn.onclick = openMenu;
}
if (overlay) {
    overlay.onclick = closeMenu;
}

// Остальные функции
async function loadCurrentUser() {
    if (!token) return;
    try {
        const res = await fetch(`${API_URL}/api/me`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) currentUser = await res.json();
        else logout();
    } catch(e) {}
}

async function loadAllVideos() {
    try { const res = await fetch(`${API_URL}/api/videos`); const data = await res.json(); allVideos = data.videos || []; } catch(e) { allVideos = []; }
}

function formatViews(views) {
    if (views >= 1000000) return (views/1000000).toFixed(1)+'M';
    if (views >= 1000) return (views/1000).toFixed(1)+'K';
    return views;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function renderVideosGrid(videos) {
    if (!videos || videos.length === 0) return '<div class="empty-state">📭 Пока нет видео</div>';
    return `<div class="video-grid">${videos.map(v => `
        <div class="video-card" onclick="openVideo('${v.id}')">
            <div class="thumbnail">🎬</div>
            <div class="video-details">
                <div class="channel-avatar">📺</div>
                <div class="video-info">
                    <h3>${escapeHtml(v.title)}</h3>
                    <p>${escapeHtml(v.uploader_name)}</p>
                    <div class="video-stats">
                        <span>👁️ ${formatViews(v.views)} просмотров</span>
                        <span>❤️ ${v.likes || 0}</span>
                    </div>
                </div>
            </div>
        </div>
    `).join('')}</div>`;
}

async function renderPage() {
    const contentDiv = document.getElementById('content');
    if (currentPage === 'home') {
        await loadAllVideos();
        let videos = [...allVideos];
        if (currentTab === 'trending') videos.sort((a,b) => (b.views||0)-(a.views||0));
        if (currentTab === 'recommended') videos.sort((a,b) => (b.likes||0)-(a.likes||0));
        const chips = `<div class="chips"><button class="chip ${currentTab==='all'?'active':''}" data-tab="all">Все видео</button><button class="chip ${currentTab==='trending'?'active':''}" data-tab="trending">Тренды</button><button class="chip ${currentTab==='recommended'?'active':''}" data-tab="recommended">Рекомендации</button></div>`;
        contentDiv.innerHTML = chips + renderVideosGrid(videos);
        document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', (e) => { currentTab = e.target.dataset.tab; renderPage(); }));
    }
    else if (currentPage === 'quick') {
        contentDiv.innerHTML = '<div class="empty-state">⚡ Quick видео</div>';
    }
    else if (currentPage === 'my-channel') {
        contentDiv.innerHTML = '<div class="empty-state">📺 Мой канал</div>';
    }
    else if (currentPage === 'subscriptions') {
        contentDiv.innerHTML = '<div class="empty-state">⭐ Подписки</div>';
    }
    else if (currentPage === 'history') {
        contentDiv.innerHTML = '<div class="empty-state">📜 История</div>';
    }
    else if (currentPage === 'subscribers-list') {
        contentDiv.innerHTML = '<div class="empty-state">👥 Мои подписчики</div>';
    }
}

window.openVideo = function(id) {
    window.location.href = `/letsfiohub/watch.html?id=${id}`;
}

async function searchVideos() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (!q) { renderPage(); return; }
    await loadAllVideos();
    const f = allVideos.filter(v => v.title?.toLowerCase().includes(q));
    document.getElementById('content').innerHTML = f.length ? renderVideosGrid(f) : '<div class="empty-state">🔍 Ничего не найдено</div>';
}

async function register(username, email, password) {
    const res = await fetch(`${API_URL}/api/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password }) });
    if (!res.ok) throw new Error(await res.text());
    return await res.json();
}
async function login(email, password) {
    const res = await fetch(`${API_URL}/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    if (!res.ok) throw new Error('Неверный email или пароль');
    const data = await res.json();
    token = data.access_token; currentUser = data.user;
    localStorage.setItem('token', token);
    updateAuthUI();
    return true;
}
function logout() { token = null; currentUser = null; localStorage.removeItem('token'); updateAuthUI(); renderPage(); }
function updateAuthUI() {
    const u = document.getElementById('uploadBtn'), l = document.getElementById('loginBtn'), lo = document.getElementById('logoutBtn');
    if (token && currentUser) {
        u.style.display = 'inline-block';
        l.style.display = 'none';
        lo.style.display = 'inline-block';
    } else {
        u.style.display = 'none';
        l.style.display = 'inline-block';
        lo.style.display = 'none';
    }
}

document.getElementById('searchBtn').onclick = searchVideos;
document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchVideos(); });
document.getElementById('logoHome').onclick = () => { currentPage = 'home'; renderPage(); };
document.getElementById('loginBtn').onclick = () => document.getElementById('authModal').style.display = 'flex';
document.getElementById('logoutBtn').onclick = logout;
document.getElementById('uploadBtn').onclick = () => alert('Загрузка видео');

document.querySelectorAll('.sidebar-item').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentPage = item.dataset.page;
        renderPage();
    });
});

let isLogin = true;
document.getElementById('authSwitchBtn').onclick = () => {
    isLogin = !isLogin;
    const title = document.getElementById('authTitle');
    const usernameField = document.getElementById('authUsername');
    if (isLogin) {
        title.textContent = 'Вход'; usernameField.style.display = 'none';
        document.getElementById('authSubmitBtn').textContent = 'Войти';
        document.getElementById('authSwitchText').textContent = 'Нет аккаунта?';
        document.getElementById('authSwitchBtn').textContent = 'Регистрация';
    } else {
        title.textContent = 'Регистрация'; usernameField.style.display = 'block';
        document.getElementById('authSubmitBtn').textContent = 'Зарегистрироваться';
        document.getElementById('authSwitchText').textContent = 'Уже есть аккаунт?';
        document.getElementById('authSwitchBtn').textContent = 'Войти';
    }
};
document.getElementById('authForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    try {
        if (isLogin) { await login(email, password); document.getElementById('authModal').style.display = 'none'; renderPage(); }
        else { const username = document.getElementById('authUsername').value; await register(username, email, password); await login(email, password); document.getElementById('authModal').style.display = 'none'; renderPage(); }
    } catch(err) { alert('Ошибка: ' + err.message); }
};

loadCurrentUser().then(() => renderPage());
</script>
</body>
</html>
