<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover {
            background-color: #272727;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 4px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-lets { font-size: 1.1rem; font-weight: 600; color: white; }
        .logo-figure { font-size: 1rem; color: #aaa; }
        .logo-it { font-size: 0.95rem; color: #888; }
        .logo-fiohub { font-size: 0.75rem; color: #ff0000; margin-left: 4px; }

        .header-center {
            flex: 1;
            max-width: 600px;
            margin: 0 32px;
            display: flex;
        }

        .search-input {
            flex: 1;
            padding: 10px 16px;
            background-color: #121212;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            color: white;
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: #1c62b9;
        }

        .search-btn {
            background-color: #222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 40px 40px 0;
            padding: 0 20px;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }

        .search-btn:hover {
            background-color: #3f3f3f;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .icon-btn:hover {
            background-color: #272727;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background-color: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }

        /* Sidebar - убраны подписки */
        .sidebar {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            width: 240px;
            background-color: #0f0f0f;
            padding: 12px 0;
            overflow-y: auto;
            z-index: 90;
            transition: transform 0.3s ease;
        }

        .sidebar.closed {
            transform: translateX(-240px);
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 8px 24px;
            cursor: pointer;
            border-radius: 10px;
            margin: 2px 8px;
            color: #f1f1f1;
        }

        .sidebar-item:hover {
            background-color: #272727;
        }

        .sidebar-item.active {
            background-color: #272727;
        }

        .sidebar-item span:first-child {
            font-size: 24px;
            width: 24px;
        }

        .sidebar-item span:last-child {
            font-size: 14px;
        }

        .sidebar-divider {
            height: 1px;
            background-color: #303030;
            margin: 12px 12px;
        }

        .sidebar-title {
            color: #aaa;
            font-size: 12px;
            padding: 8px 24px;
        }

        /* Main Content */
        .main-content {
            margin-left: 240px;
            margin-top: 56px;
            padding: 24px;
            transition: margin-left 0.3s ease;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* Chips (вкладки) */
        .chips {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            position: sticky;
            top: 56px;
            background-color: #0f0f0f;
            padding: 12px 0;
            z-index: 80;
        }

        .chip {
            padding: 8px 16px;
            background-color: #272727;
            border: none;
            border-radius: 40px;
            color: #f1f1f1;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        .chip.active {
            background-color: #f1f1f1;
            color: #0f0f0f;
        }

        .chip:hover {
            background-color: #3f3f3f;
        }

        /* Video Grid - видео видны сразу */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .video-card {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 8px;
            position: relative;
        }

        .video-details {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .channel-icon {
            width: 36px;
            height: 36px;
            background-color: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .video-text h3 {
            font-size: 16px;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-text p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 2px;
        }

        .video-stats {
            font-size: 12px;
            color: #aaa;
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #aaa;
        }

        .btn-upload {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 16px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #272727;
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 16px;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background-color: #121212;
            border: 1px solid #3f3f3f;
            border-radius: 8px;
            color: white;
        }

        .modal-content button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }

        .queue-item {
            background-color: #3f3f3f;
            padding: 8px;
            margin: 4px 0;
            border-radius: 8px;
            font-size: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: #3f3f3f;
            border-radius: 2px;
            margin-top: 12px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #ff0000;
            border-radius: 2px;
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-240px);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .header-center {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuToggle">☰</button>
            <div class="logo" id="logoHome">
                <span class="logo-lets">Let's</span>
                <span class="logo-figure">figure</span>
                <span class="logo-it">it out</span>
                <span class="logo-fiohub">FioHub</span>
            </div>
        </div>
        <div class="header-center">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="uploadBtn">📤</button>
            <button class="icon-btn">🔔</button>
            <div class="avatar" id="avatarBtn">U</div>
        </div>
    </header>

    <!-- Sidebar (без подписок) -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-item active" data-nav="home">
            <span>🏠</span><span>Главная</span>
        </div>
        <div class="sidebar-item" data-nav="shorts">
            <span>🔥</span><span>Shorts</span>
        </div>
        <div class="sidebar-item" data-nav="subscriptions">
            <span>📺</span><span>Подписки</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-title">Вам может понравиться</div>
        <div class="sidebar-item" data-nav="channel">
            <span>🎬</span><span>Let's FioHub</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="chips" id="chipsContainer"></div>
        <div id="videosContainer"></div>
    </main>
</div>

<!-- Upload Modal -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>📤 Загрузить видео</h2>
        <form id="uploadForm">
            <input type="text" id="videoTitle" placeholder="Название видео" required>
            <textarea id="videoDescription" rows="3" placeholder="Описание"></textarea>
            <input type="file" id="videoFiles" accept="video/*" multiple required>
            <div id="queueContainer"></div>
            <div class="progress-bar" id="progressBar" style="display: none;"><div class="progress-fill" id="progressFill"></div></div>
            <div class="upload-status" id="uploadStatus"></div>
            <button type="submit">📤 Загрузить</button>
        </form>
    </div>
</div>

<script>
    const API_URL = 'https://letsfiohub-api.onrender.com';
    let allVideos = [];
    let currentCategory = 'all';

    // DOM элементы
    const chipsContainer = document.getElementById('chipsContainer');
    const videosContainer = document.getElementById('videosContainer');

    // Загрузка видео
    async function loadVideos() {
        videosContainer.innerHTML = '<div class="empty-state">⏳ Загрузка видео...</div>';
        try {
            const response = await fetch(`${API_URL}/api/v1/videos`);
            if (response.ok) {
                const data = await response.json();
                allVideos = data.videos || [];
                renderUI();
            } else {
                throw new Error('API error');
            }
        } catch (err) {
            videosContainer.innerHTML = `<div class="empty-state"><p>❌ Сервер просыпается...</p><button class="chip" onclick="loadVideos()">Повторить</button></div>`;
        }
    }

    function renderUI() {
        renderChips();
        renderVideos();
    }

    function renderChips() {
        const chips = ['Все видео', 'Тренды', 'Рекомендации'];
        chipsContainer.innerHTML = chips.map((chip, idx) => {
            const category = ['all', 'trending', 'recommended'][idx];
            return `<button class="chip ${currentCategory === category ? 'active' : ''}" data-category="${category}">${chip}</button>`;
        }).join('');
        
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                currentCategory = e.currentTarget.dataset.category;
                renderUI();
            });
        });
    }

    function renderVideos() {
        let videos = [...allVideos];
        if (currentCategory === 'trending') {
            videos.sort((a, b) => (b.views || 0) - (a.views || 0));
        } else if (currentCategory === 'recommended') {
            videos.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        }

        if (videos.length === 0) {
            videosContainer.innerHTML = `
                <div class="empty-state">
                    <p>📭 Пока нет видео</p>
                    <button class="btn-upload" onclick="document.getElementById('uploadBtn').click()">📤 Загрузить первое видео</button>
                </div>
            `;
            return;
        }

        videosContainer.innerHTML = `
            <div class="video-grid">
                ${videos.map(video => `
                    <div class="video-card" onclick="openVideo('${video.id}')">
                        <div class="thumbnail">🎬</div>
                        <div class="video-details">
                            <div class="channel-icon">📺</div>
                            <div class="video-text">
                                <h3>${escapeHtml(video.title) || 'Без названия'}</h3>
                                <p>Let's FioHub</p>
                                <div class="video-stats">
                                    <span>👁️ ${formatViews(video.views || 0)}</span>
                                    <span>❤️ ${video.likes || 0}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function formatViews(views) {
        if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M';
        if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
        return views;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function openVideo(videoId) {
        window.location.href = `/letsfiohub/watch.html?id=${videoId}`;
    }

    // Поиск
    function searchVideos() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        if (!query) {
            renderVideos();
            return;
        }
        const filtered = allVideos.filter(v => v.title?.toLowerCase().includes(query));
        if (filtered.length === 0) {
            videosContainer.innerHTML = '<div class="empty-state">🔍 Ничего не найдено</div>';
        } else {
            videosContainer.innerHTML = `
                <div class="video-grid">
                    ${filtered.map(video => `
                        <div class="video-card" onclick="openVideo('${video.id}')">
                            <div class="thumbnail">🎬</div>
                            <div class="video-details">
                                <div class="channel-icon">📺</div>
                                <div class="video-text">
                                    <h3>${escapeHtml(video.title)}</h3>
                                    <p>Let's FioHub</p>
                                    <div class="video-stats">
                                        <span>👁️ ${formatViews(video.views || 0)}</span>
                                        <span>❤️ ${video.likes || 0}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    }

    // Модальное окно
    const modal = document.getElementById('uploadModal');
    document.getElementById('uploadBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('avatarBtn').onclick = () => modal.style.display = 'flex';
    document.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // Выбор файлов
    const fileInput = document.getElementById('videoFiles');
    const queueContainer = document.getElementById('queueContainer');
    fileInput.onchange = () => {
        const files = fileInput.files;
        queueContainer.innerHTML = `<div class="sidebar-title">Выбрано файлов: ${files.length}</div>`;
        for (let i = 0; i < files.length; i++) {
            queueContainer.innerHTML += `<div class="queue-item">📹 ${files[i].name}</div>`;
        }
    };

    // Отправка формы
    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        const title = document.getElementById('videoTitle').value;
        const description = document.getElementById('videoDescription').value;
        const files = fileInput.files;
        
        if (!title || files.length === 0) {
            alert('Заполните название и выберите видео');
            return;
        }
        
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusDiv = document.getElementById('uploadStatus');
        
        progressBar.style.display = 'block';
        let completed = 0;
        let failed = 0;
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const formData = new FormData();
            const nameWithoutExt = file.name.replace(/\.[^/.]+$/, '');
            formData.append('title', `${title} - ${nameWithoutExt}`);
            formData.append('description', description);
            formData.append('file', file);
            
            statusDiv.innerHTML = `Загрузка ${i+1}/${files.length}: ${file.name}...`;
            
            try {
                const response = await fetch(`${API_URL}/api/v1/videos/upload?user_id=1`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    completed++;
                } else {
                    failed++;
                }
            } catch (err) {
                failed++;
            }
            
            const percent = ((i + 1) / files.length) * 100;
            progressFill.style.width = `${percent}%`;
            statusDiv.innerHTML = `✅ Загружено: ${completed}, ❌ Ошибок: ${failed}`;
        }
        
        statusDiv.innerHTML = `✅ Завершено! Загружено: ${completed}, Ошибок: ${failed}`;
        setTimeout(() => {
            modal.style.display = 'none';
            document.getElementById('uploadForm').reset();
            queueContainer.innerHTML = '';
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
            loadVideos();
        }, 2000);
    };

    // Навигация
    document.getElementById('searchBtn').addEventListener('click', searchVideos);
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchVideos();
    });
    document.getElementById('logoHome').addEventListener('click', () => {
        loadVideos();
    });
    
    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            const nav = item.dataset.nav;
            if (nav === 'home') {
                loadVideos();
            } else {
                videosContainer.innerHTML = '<div class="empty-state">🚧 В разработке</div>';
            }
        });
    });
    
    let sidebarVisible = true;
    document.getElementById('menuToggle').addEventListener('click', () => {
        sidebarVisible = !sidebarVisible;
        document.getElementById('sidebar').classList.toggle('closed', !sidebarVisible);
        document.getElementById('mainContent').classList.toggle('expanded', !sidebarVisible);
    });
    
    loadVideos();
</script>

</body>
</html>
