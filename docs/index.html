<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', Arial, sans-serif; background-color: #0f0f0f; color: #f1f1f1; }

        /* Header */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background-color: #0f0f0f; display: flex; align-items: center;
            justify-content: space-between; padding: 0 16px; z-index: 100;
            border-bottom: 1px solid #303030;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .menu-btn:hover { background-color: #272727; }
        
        /* Логотип - УВЕЛИЧЕННЫЙ И КРУГЛЫЙ */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            overflow: hidden;
            background-color: #0f0f0f;
            transition: transform 0.2s;
        }
        .logo:hover {
            transform: scale(1.05);
        }
        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .header-center { flex: 1; max-width: 600px; margin: 0 32px; display: flex; }
        .search-input { flex: 1; padding: 10px 16px; background-color: #121212; border: 1px solid #303030; border-radius: 40px 0 0 40px; color: white; }
        .search-btn { background-color: #222; border: 1px solid #303030; border-left: none; border-radius: 0 40px 40px 0; padding: 0 20px; cursor: pointer; color: white; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .icon-btn:hover { background-color: #272727; }
        
        .avatar { display: none; }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 56px; bottom: 0; left: 0; width: 240px;
            background-color: #0f0f0f; padding: 12px 0; overflow-y: auto; z-index: 90;
            transition: transform 0.3s ease;
        }
        .sidebar.closed { transform: translateX(-240px); }
        .sidebar-item { display: flex; align-items: center; gap: 24px; padding: 8px 24px; cursor: pointer; border-radius: 10px; margin: 2px 8px; }
        .sidebar-item:hover { background-color: #272727; }
        .sidebar-item.active { background-color: #272727; }
        .sidebar-item span:first-child { font-size: 24px; width: 24px; }
        .sidebar-divider { height: 1px; background-color: #303030; margin: 12px 12px; }
        .sidebar-title { color: #aaa; font-size: 12px; padding: 8px 24px; }

        /* Main */
        .main-content { margin-left: 240px; margin-top: 56px; padding: 24px; transition: margin-left 0.3s ease; }
        .main-content.expanded { margin-left: 0; }
        .chips { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .chip { padding: 8px 16px; background-color: #272727; border: none; border-radius: 40px; color: #f1f1f1; cursor: pointer; }
        .chip.active { background-color: #f1f1f1; color: #0f0f0f; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .video-card { cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #2a2a2a, #1a1a1a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 8px; }
        .video-details { display: flex; gap: 12px; margin-top: 8px; }
        .channel-icon { width: 36px; height: 36px; background-color: #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .video-text h3 { font-size: 16px; margin-bottom: 4px; }
        .video-text p { font-size: 14px; color: #aaa; }
        .video-stats { font-size: 12px; color: #aaa; display: flex; gap: 8px; margin-top: 4px; }
        .delete-btn { background: none; border: none; color: #ff0000; cursor: pointer; font-size: 12px; margin-left: 8px; }
        .delete-btn:hover { text-decoration: underline; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: #272727; padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; }
        .modal-content h2 { margin-bottom: 16px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; background: #121212; border: 1px solid #3f3f3f; border-radius: 8px; color: white; }
        .modal-content button { background: #ff0000; color: white; border: none; padding: 12px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 16px; }
        .close-modal { float: right; font-size: 24px; cursor: pointer; color: #aaa; }
        .queue-item { background: #3f3f3f; padding: 8px; margin: 4px 0; border-radius: 8px; font-size: 12px; }
        .progress-bar { width: 100%; height: 4px; background: #3f3f3f; border-radius: 2px; margin-top: 12px; }
        .progress-fill { width: 0%; height: 100%; background: #ff0000; border-radius: 2px; transition: width 0.3s; }
        .empty-state { text-align: center; padding: 60px; color: #aaa; }
        .btn-primary { background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin-top: 16px; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-240px); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .header-center { display: none; }
            .logo { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuToggle">☰</button>
            <div class="logo" id="logoHome">
                <img src="logo.png" alt="Let's figure it out" class="logo-image" onerror="this.style.display='none'">
            </div>
        </div>
        <div class="header-center">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="uploadBtn" style="display: none;">📤</button>
            <button class="icon-btn" id="loginBtn">👤</button>
            <button class="icon-btn" id="logoutBtn" style="display: none;">🚪</button>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-item active" data-page="home"><span>🏠</span><span>Главная</span></div>
        <div class="sidebar-item" data-page="my-channel"><span>📺</span><span>Мой канал</span></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-title">Вам может понравиться</div>
        <div class="sidebar-item" data-page="fiohub"><span>🎬</span><span>Let's FioHub</span></div>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="chips" id="chipsContainer"></div>
        <div id="contentContainer"></div>
    </main>
</div>

<!-- Модальное окно входа/регистрации -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2 id="authTitle">Вход</h2>
        <form id="authForm">
            <input type="text" id="authUsername" placeholder="Имя пользователя" style="display: none;">
            <input type="email" id="authEmail" placeholder="Email" required>
            <input type="password" id="authPassword" placeholder="Пароль" required>
            <button type="submit" id="authSubmitBtn">Войти</button>
        </form>
        <p style="margin-top: 16px; text-align: center;">
            <span id="authSwitchText">Нет аккаунта?</span>
            <button id="authSwitchBtn" style="background: none; border: none; color: #ff0000; cursor: pointer;">Регистрация</button>
        </p>
    </div>
</div>

<!-- Модальное окно загрузки видео -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>📤 Загрузить видео</h2>
        <form id="uploadForm">
            <input type="text" id="videoTitle" placeholder="Название видео" required>
            <textarea id="videoDescription" rows="3" placeholder="Описание"></textarea>
            <input type="file" id="videoFiles" accept="video/*" multiple required>
            <div id="queueContainer"></div>
            <div class="progress-bar" id="progressBar" style="display: none;"><div class="progress-fill" id="progressFill"></div></div>
            <div class="upload-status" id="uploadStatus"></div>
            <button type="submit">📤 Загрузить</button>
        </form>
    </div>
</div>

<script>
    const API_URL = 'https://letsfiohub-api.onrender.com';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let allVideos = [];
    let currentCategory = 'all';
    let currentPage = 'home';
    let currentChannelVideos = [];

    const uploadBtn = document.getElementById('uploadBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const chipsContainer = document.getElementById('chipsContainer');
    const contentContainer = document.getElementById('contentContainer');

    function updateAuthUI() {
        if (token && currentUser) {
            uploadBtn.style.display = 'flex';
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'flex';
            document.querySelectorAll('.sidebar-item').forEach(item => {
                if (item.dataset.page === 'my-channel') {
                    item.querySelector('span:last-child').textContent = currentUser.channel_name || 'Мой канал';
                }
            });
        } else {
            uploadBtn.style.display = 'none';
            loginBtn.style.display = 'flex';
            logoutBtn.style.display = 'none';
        }
    }

    async function loadCurrentUser() {
        if (!token) return;
        try {
            const response = await fetch(`${API_URL}/api/users/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                currentUser = await response.json();
                updateAuthUI();
            } else {
                logout();
            }
        } catch (err) {
            console.error('Auth error:', err);
        }
    }

    async function register(username, email, password) {
        const response = await fetch(`${API_URL}/api/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        if (!response.ok) throw new Error('Registration failed');
        return await response.json();
    }

    async function login(email, password) {
        const formData = new URLSearchParams();
        formData.append('username', email);
        formData.append('password', password);
        const response = await fetch(`${API_URL}/api/token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        if (!response.ok) throw new Error('Login failed');
        const data = await response.json();
        token = data.access_token;
        localStorage.setItem('token', token);
        await loadCurrentUser();
        return true;
    }

    function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('token');
        updateAuthUI();
        loadAllVideos();
    }

    async function loadAllVideos() {
        try {
            const response = await fetch(`${API_URL}/api/videos`);
            if (response.ok) {
                const data = await response.json();
                allVideos = data.videos || [];
                renderCurrentPage();
            }
        } catch (err) {
            console.error('Error loading videos:', err);
        }
    }

    async function loadChannelVideos(username) {
        try {
            const response = await fetch(`${API_URL}/api/channels/${username}`);
            if (response.ok) {
                const data = await response.json();
                currentChannelVideos = data.videos || [];
                renderChannelPage(data);
            }
        } catch (err) {
            console.error('Error loading channel:', err);
        }
    }

    async function deleteVideo(videoId) {
        if (!confirm('Удалить видео?')) return;
        try {
            const response = await fetch(`${API_URL}/api/videos/${videoId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                await loadAllVideos();
                if (currentPage === 'my-channel' && currentUser) {
                    await loadChannelVideos(currentUser.username);
                }
                renderCurrentPage();
            } else {
                alert('Ошибка удаления');
            }
        } catch (err) {
            console.error('Delete error:', err);
        }
    }

    async function uploadVideo(title, description, file) {
        const formData = new FormData();
        formData.append('title', title);
        formData.append('description', description);
        formData.append('file', file);
        const response = await fetch(`${API_URL}/api/videos/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        if (!response.ok) throw new Error('Upload failed');
        return await response.json();
    }

    async function uploadMultipleVideos(titleBase, description, files) {
        let completed = 0, failed = 0;
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const nameWithoutExt = file.name.replace(/\.[^/.]+$/, '');
            try {
                await uploadVideo(`${titleBase} - ${nameWithoutExt}`, description, file);
                completed++;
            } catch {
                failed++;
            }
            const percent = ((i + 1) / files.length) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('uploadStatus').innerHTML = `✅ Загружено: ${completed}, ❌ Ошибок: ${failed}`;
        }
        return { completed, failed };
    }

    function renderHomePage() {
        let videos = [...allVideos];
        if (currentCategory === 'trending') {
            videos.sort((a, b) => (b.views || 0) - (a.views || 0));
        } else if (currentCategory === 'recommended') {
            videos.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        }

        if (videos.length === 0) {
            contentContainer.innerHTML = `<div class="empty-state"><p>📭 Пока нет видео</p></div>`;
            return;
        }

        contentContainer.innerHTML = `
            <div class="video-grid">
                ${videos.map(video => `
                    <div class="video-card" onclick="openVideo('${video.id}')">
                        <div class="thumbnail">🎬</div>
                        <div class="video-details">
                            <div class="channel-icon">📺</div>
                            <div class="video-text">
                                <h3>${escapeHtml(video.title)}</h3>
                                <p>${escapeHtml(video.uploader_name)}</p>
                                <div class="video-stats">
                                    <span>👁️ ${formatViews(video.views)}</span>
                                    <span>❤️ ${video.likes}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderChannelPage(channel) {
        chipsContainer.innerHTML = '';
        if (channel.videos.length === 0) {
            contentContainer.innerHTML = `<div class="empty-state"><p>📭 На канале пока нет видео</p></div>`;
            return;
        }
        contentContainer.innerHTML = `
            <h2 style="margin-bottom: 20px;">📺 ${escapeHtml(channel.channel_name)}</h2>
            <div class="video-grid">
                ${channel.videos.map(video => `
                    <div class="video-card">
                        <div class="thumbnail" onclick="openVideo('${video.id}')">🎬</div>
                        <div class="video-details">
                            <div class="channel-icon">📺</div>
                            <div class="video-text">
                                <h3>${escapeHtml(video.title)}</h3>
                                <div class="video-stats">
                                    <span>👁️ ${formatViews(video.views)}</span>
                                    <span>❤️ ${video.likes}</span>
                                    ${currentUser && video.uploader_name === currentUser.username ? `<button class="delete-btn" onclick="deleteVideo('${video.id}')">🗑️ Удалить</button>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderCurrentPage() {
        if (currentPage === 'home') {
            renderHomePage();
            renderChips();
        } else if (currentPage === 'my-channel' && currentUser) {
            loadChannelVideos(currentUser.username);
        }
    }

    function formatViews(views) {
        if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M';
        if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
        return views;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function openVideo(videoId) {
        window.location.href = `/letsfiohub/watch.html?id=${videoId}`;
    }

    function searchVideos() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        if (!query) return renderHomePage();
        const filtered = allVideos.filter(v => v.title?.toLowerCase().includes(query));
        if (filtered.length === 0) {
            contentContainer.innerHTML = '<div class="empty-state">🔍 Ничего не найдено</div>';
        } else {
            contentContainer.innerHTML = `<div class="video-grid">${filtered.map(video => `
                <div class="video-card" onclick="openVideo('${video.id}')">
                    <div class="thumbnail">🎬</div>
                    <div class="video-details">
                        <div class="channel-icon">📺</div>
                        <div class="video-text">
                            <h3>${escapeHtml(video.title)}</h3>
                            <p>${escapeHtml(video.uploader_name)}</p>
                            <div class="video-stats">👁️ ${formatViews(video.views)} ❤️ ${video.likes}</div>
                        </div>
                    </div>
                </div>`).join('')}</div>`;
        }
    }

    const authModal = document.getElementById('authModal');
    let isLoginMode = true;

    document.getElementById('loginBtn').onclick = () => authModal.style.display = 'flex';
    document.querySelectorAll('.close-modal').forEach(btn => {
        btn.onclick = () => { authModal.style.display = 'none'; document.getElementById('uploadModal').style.display = 'none'; };
    });
    window.onclick = (e) => { if (e.target === authModal) authModal.style.display = 'none'; if (e.target === document.getElementById('uploadModal')) document.getElementById('uploadModal').style.display = 'none'; };

    document.getElementById('authSwitchBtn').onclick = () => {
        isLoginMode = !isLoginMode;
        const title = document.getElementById('authTitle');
        const usernameField = document.getElementById('authUsername');
        const submitBtn = document.getElementById('authSubmitBtn');
        const switchText = document.getElementById('authSwitchText');
        if (isLoginMode) {
            title.textContent = 'Вход';
            usernameField.style.display = 'none';
            submitBtn.textContent = 'Войти';
            switchText.textContent = 'Нет аккаунта?';
            document.getElementById('authSwitchBtn').textContent = 'Регистрация';
        } else {
            title.textContent = 'Регистрация';
            usernameField.style.display = 'block';
            submitBtn.textContent = 'Зарегистрироваться';
            switchText.textContent = 'Уже есть аккаунт?';
            document.getElementById('authSwitchBtn').textContent = 'Войти';
        }
    };

    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        try {
            if (isLoginMode) {
                await login(email, password);
                authModal.style.display = 'none';
                await loadAllVideos();
                renderCurrentPage();
            } else {
                const username = document.getElementById('authUsername').value;
                await register(username, email, password);
                await login(email, password);
                authModal.style.display = 'none';
                await loadAllVideos();
                renderCurrentPage();
            }
        } catch (err) {
            alert('Ошибка: ' + err.message);
        }
    };

    const uploadModal = document.getElementById('uploadModal');
    document.getElementById('uploadBtn').onclick = () => uploadModal.style.display = 'flex';
    const fileInput = document.getElementById('videoFiles');
    fileInput.onchange = () => {
        const files = fileInput.files;
        const container = document.getElementById('queueContainer');
        container.innerHTML = `<div class="sidebar-title">Выбрано: ${files.length}</div>`;
        for (let f of files) container.innerHTML += `<div class="queue-item">📹 ${f.name}</div>`;
    };

    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        const title = document.getElementById('videoTitle').value;
        const description = document.getElementById('videoDescription').value;
        const files = fileInput.files;
        if (!title || !files.length) return alert('Заполните название и выберите видео');

        document.getElementById('progressBar').style.display = 'block';
        document.getElementById('uploadStatus').innerHTML = 'Загрузка...';
        const result = await uploadMultipleVideos(title, description, files);
        document.getElementById('uploadStatus').innerHTML = `✅ Завершено! Загружено: ${result.completed}, Ошибок: ${result.failed}`;
        setTimeout(() => {
            uploadModal.style.display = 'none';
            document.getElementById('uploadForm').reset();
            document.getElementById('queueContainer').innerHTML = '';
            document.getElementById('progressBar').style.display = 'none';
            loadAllVideos();
            renderCurrentPage();
        }, 2000);
    };

    document.getElementById('searchBtn').addEventListener('click', searchVideos);
    document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchVideos(); });
    document.getElementById('logoHome').addEventListener('click', () => { currentPage = 'home'; loadAllVideos(); });
    document.getElementById('logoutBtn').addEventListener('click', logout);

    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            const page = item.dataset.page;
            if (page === 'home') {
                currentPage = 'home';
                loadAllVideos();
            } else if (page === 'my-channel') {
                if (!currentUser) {
                    authModal.style.display = 'flex';
                    return;
                }
                currentPage = 'my-channel';
                loadChannelVideos(currentUser.username);
            }
        });
    });

    function renderChips() {
        if (currentPage !== 'home') {
            chipsContainer.innerHTML = '';
            return;
        }
        const chips = ['Все видео', 'Тренды', 'Рекомендации'];
        chipsContainer.innerHTML = chips.map((chip, idx) => {
            const category = ['all', 'trending', 'recommended'][idx];
            return `<button class="chip ${currentCategory === category ? 'active' : ''}" data-category="${category}">${chip}</button>`;
        }).join('');
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                currentCategory = e.currentTarget.dataset.category;
                renderHomePage();
                renderChips();
            });
        });
    }

    let sidebarVisible = true;
    document.getElementById('menuToggle').addEventListener('click', () => {
        sidebarVisible = !sidebarVisible;
        document.getElementById('sidebar').classList.toggle('closed', !sidebarVisible);
        document.getElementById('mainContent').classList.toggle('expanded', !sidebarVisible);
    });

    loadCurrentUser().then(() => {
        loadAllVideos();
    });
</script>

</body>
</html>
