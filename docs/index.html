<!DOCTYPE html>
<html>
<head>
    <title>Let's FioHub</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        video { max-width: 100%; margin: 10px 0; }
        .video { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 8px; }
        h1 { color: #ff0000; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>🎬 Let's FioHub</h1>
    <p>Ваш видеохостинг работает!</p>
    <p>🔗 API: <a href="https://letsfiohub-api.onrender.com" target="_blank">letsfiohub-api.onrender.com</a></p>
    <hr>
    <h2>📹 Ваши видео</h2>
    <div id="videos" class="loading">⏳ Пробуждение сервера... (до 60 секунд)</div>

    <script>
        async function loadVideos() {
            const container = document.getElementById('videos');
            container.innerHTML = '⏳ Сервер просыпается, подождите... (до 60 секунд)';
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 90000); // 90 секунд таймаут
                
                const response = await fetch('https://letsfiohub-api.onrender.com/api/v1/videos', {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const data = await response.json();
                
                if (!data.videos || data.videos.length === 0) {
                    container.innerHTML = '<p>📭 Нет видео. <a href="https://letsfiohub-api.onrender.com/docs" target="_blank">Загрузите первое видео через API</a></p>';
                    return;
                }
                
                container.innerHTML = '';
                data.videos.forEach(video => {
                    container.innerHTML += `
                        <div class="video">
                            <h3>${video.title || 'Без названия'}</h3>
                            <p>${video.description || 'Нет описания'}</p>
                            <video controls>
                                <source src="https://letsfiohub-api.onrender.com/api/v1/videos/${video.id}/stream">
                            </video>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = '<p>❌ Сервер просыпается. <button onclick="location.reload()">Обновить страницу</button> через 30 секунд.</p>';
            }
        }
        
        loadVideos();
    </script>
</body>
</html>
