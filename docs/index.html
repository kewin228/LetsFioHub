<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #f1f1f1; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #0f0f0f; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; border-bottom: 1px solid #303030; }
        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo img { height: 32px; }
        .search-form { flex: 1; max-width: 600px; margin: 0 32px; display: flex; }
        .search-input { flex: 1; padding: 10px 16px; background: #121212; border: 1px solid #303030; border-radius: 40px 0 0 40px; color: white; }
        .search-btn { background: #222; border: 1px solid #303030; border-left: none; border-radius: 0 40px 40px 0; padding: 0 20px; cursor: pointer; color: white; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .sidebar { position: fixed; top: 56px; bottom: 0; left: 0; width: 260px; background: #0f0f0f; padding: 16px 0; overflow-y: auto; }
        .sidebar-item { display: flex; align-items: center; gap: 24px; padding: 10px 24px; cursor: pointer; border-radius: 10px; margin: 4px 12px; }
        .sidebar-item:hover { background: #272727; }
        .sidebar-item.active { background: #272727; }
        .main-content { margin-left: 260px; margin-top: 56px; padding: 24px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
        .video-card { cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #2a2a2a, #1a1a1a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 32px; border-radius: 20px; width: 90%; max-width: 500px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; background: #121212; border: 1px solid #303030; border-radius: 8px; color: white; }
        .modal-content button { background: #ff0000; color: white; border: none; padding: 12px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 16px; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: #aaa; }
        .channel-cover { width: 100%; height: 150px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .empty-state { text-align: center; padding: 60px; color: #aaa; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-260px); } .main-content { margin-left: 0; } .search-form { display: none; } }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo" id="logoHome"><img src="logo.png" alt="Logo"><span>Let's FioHub</span></div>
        <div class="search-form"><input type="text" class="search-input" id="searchInput" placeholder="Поиск..."><button class="search-btn" id="searchBtn">🔍</button></div>
        <div><button class="icon-btn" id="uploadBtn" style="display: none;">📤</button><button class="icon-btn" id="loginBtn">👤</button><button class="icon-btn" id="logoutBtn" style="display: none;">🚪</button></div>
    </header>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-item active" data-page="home"><span>🏠</span><span>Главная</span></div>
        <div class="sidebar-item" data-page="quick"><span>⚡</span><span>Quick</span></div>
        <div class="sidebar-item" data-page="my-channel"><span>📺</span><span>Мой канал</span></div>
        <div class="sidebar-item" data-page="subscriptions"><span>⭐</span><span>Подписки</span></div>
        <div class="sidebar-item" data-page="history"><span>📜</span><span>История</span></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-item" data-page="subscribers-list"><span>👥</span><span>Мои подписчики</span></div>
    </aside>
    <main class="main-content" id="mainContent"><div id="content"></div></main>
</div>
<div id="authModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><h2 id="authTitle">Вход</h2><form id="authForm"><input type="text" id="authUsername" placeholder="Имя" style="display:none"><input type="email" id="authEmail" placeholder="Email" required><input type="password" id="authPassword" placeholder="Пароль" required><button type="submit" id="authSubmitBtn">Войти</button></form><p style="margin-top:16px;text-align:center"><span id="authSwitchText">Нет аккаунта?</span> <button id="authSwitchBtn" style="background:none;border:none;color:#ff0000;cursor:pointer">Регистрация</button></p></div></div>
<div id="uploadModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><h2>📤 Загрузить видео</h2><form id="uploadForm"><input type="text" id="videoTitle" placeholder="Название" required><textarea id="videoDescription" rows="3" placeholder="Описание"></textarea><label><input type="checkbox" id="isQuick"> Короткое видео</label><input type="file" id="videoFile" accept="video/*" required><button type="submit">📤 Загрузить</button></form></div></div>
<div id="editChannelModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><h2>✏️ Редактировать канал</h2><form id="editChannelForm"><textarea id="channelDesc" rows="3" placeholder="Описание канала"></textarea><label>Заставка</label><input type="file" id="channelCover" accept="image/*"><button type="submit">Сохранить</button></form></div></div>
<script>
const API_URL='https://letsfiohub-api.onrender.com';let token=localStorage.getItem('token');let currentUser=null;let allVideos=[];let quickVideos=[];let currentPage='home';
const contentDiv=document.getElementById('content');
async function loadCurrentUser(){if(!token)return;try{const r=await fetch(API_URL+'/api/me',{headers:{'Authorization':'Bearer '+token}});if(r.ok)currentUser=await r.json();else logout()}catch(e){}}
async function loadAllVideos(){try{const r=await fetch(API_URL+'/api/videos');const d=await r.json();allVideos=d.videos||[]}catch(e){}}
async function loadQuickVideos(){try{const r=await fetch(API_URL+'/api/quick');const d=await r.json();quickVideos=d.videos||[]}catch(e){}}
async function updateChannel(desc,coverFile){const fd=new FormData();fd.append('description',desc);if(coverFile)fd.append('cover',coverFile);const r=await fetch(API_URL+'/api/channel',{method:'PUT',headers:{'Authorization':'Bearer '+token},body:fd});return r.ok}
function renderVideosGrid(videos,showDelete){if(!videos||videos.length===0)return'<div class="empty-state">📭 Нет видео</div>';return'<div class="video-grid">'+videos.map(v=>'<div class="video-card" onclick="openVideo(\''+v.id+'\')"><div class="thumbnail">🎬</div><div class="video-details"><div class="channel-avatar">📺</div><div class="video-info"><h3>'+escapeHtml(v.title)+'</h3><p>'+escapeHtml(v.uploader_name)+'</p><div class="video-stats"><span>👁️ '+(v.views||0)+'</span><span>❤️ '+(v.likes||0)+'</span>'+(showDelete?'<span style="color:#ff0000;cursor:pointer;" onclick="event.stopPropagation(); deleteVideo(\''+v.id+'\')">🗑️ Удалить</span>':'')+'</div></div></div></div>').join('')+'</div>'}
function escapeHtml(t){if(!t)return '';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
async function renderPage(){if(currentPage==='home'){await loadAllVideos();contentDiv.innerHTML='<div class="chips"><button class="chip active">Все видео</button><button class="chip">Тренды</button><button class="chip">Рекомендации</button></div>'+renderVideosGrid(allVideos,false)}else if(currentPage==='quick'){await loadQuickVideos();contentDiv.innerHTML='<h2>⚡ Quick видео</h2>'+renderVideosGrid(quickVideos,false)}else if(currentPage==='my-channel'){if(!currentUser){document.getElementById('authModal').style.display='flex';return}let html='<div class="channel-cover">📺 '+escapeHtml(currentUser.channel_name||'Мой канал')+'</div><h2>'+escapeHtml(currentUser.channel_name)+'</h2><p>'+(currentUser.channel_description||'Нет описания')+'</p><p>👥 '+(currentUser.subscribers_count||0)+' подписчиков</p><button class="chip" onclick="document.getElementById(\'editChannelModal\').style.display=\'flex\'">✏️ Редактировать</button>';const myVideos=allVideos.filter(v=>v.uploader_name===currentUser.username);html+=renderVideosGrid(myVideos,true);contentDiv.innerHTML=html}else if(currentPage==='subscriptions'){contentDiv.innerHTML='<div class="empty-state">⭐ Подписки — скоро</div>'}else if(currentPage==='history'){contentDiv.innerHTML='<div class="empty-state">📜 История просмотров</div>'}else if(currentPage==='subscribers-list'){contentDiv.innerHTML='<div class="empty-state">👥 Подписчики</div>'}}
window.openVideo=function(id){window.location.href='/letsfiohub/watch.html?id='+id}
window.deleteVideo=async function(id){if(!confirm('Удалить?'))return;try{const r=await fetch(API_URL+'/api/videos/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});if(r.ok)renderPage()}catch(e){alert('Ошибка')}}
async function searchVideos(){const q=document.getElementById('searchInput').value.toLowerCase();if(!q){renderPage();return}await loadAllVideos();const f=allVideos.filter(v=>v.title?.toLowerCase().includes(q));contentDiv.innerHTML=f.length?renderVideosGrid(f,false):'<div class="empty-state">🔍 Ничего не найдено</div>'}
async function register(u,e,p){const r=await fetch(API_URL+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:e,password:p})});if(!r.ok)throw new Error(await r.text());return await r.json()}
async function login(e,p){const r=await fetch(API_URL+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});if(!r.ok)throw new Error('Неверный email или пароль');const d=await r.json();token=d.access_token;currentUser=d.user;localStorage.setItem('token',token);updateAuthUI();return true}
function logout(){token=null;currentUser=null;localStorage.removeItem('token');updateAuthUI();renderPage()}
function updateAuthUI(){const u=document.getElementById('uploadBtn'),l=document.getElementById('loginBtn'),lo=document.getElementById('logoutBtn');if(token&¤tUser){u.style.display='inline-block';l.style.display='none';lo.style.display='inline-block'}else{u.style.display='none';l.style.display='inline-block';lo.style.display='none'}}
document.getElementById('uploadForm').onsubmit=async(e)=>{e.preventDefault();const title=document.getElementById('videoTitle').value,desc=document.getElementById('videoDescription').value,isQuick=document.getElementById('isQuick').checked,file=document.getElementById('videoFile').files[0];if(!title||!file)return alert('Заполните название и выберите видео');const fd=new FormData();fd.append('title',title);fd.append('description',desc);fd.append('file',file);fd.append('is_quick',isQuick);try{const r=await fetch(API_URL+'/api/videos/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});if(r.ok){alert('Видео загружено!');document.getElementById('uploadModal').style.display='none';document.getElementById('uploadForm').reset();renderPage()}else alert('Ошибка загрузки')}catch(err){alert('Ошибка')}};
document.getElementById('editChannelForm').onsubmit=async(e)=>{e.preventDefault();const desc=document.getElementById('channelDesc').value,cover=document.getElementById('channelCover').files[0];const ok=await updateChannel(desc,cover);if(ok){alert('Канал обновлён!');document.getElementById('editChannelModal').style.display='none';await loadCurrentUser();renderPage()}else alert('Ошибка')};
document.getElementById('logoHome').onclick=()=>{currentPage='home';renderPage()};document.getElementById('searchBtn').onclick=searchVideos;document.getElementById('searchInput').addEventListener('keypress',e=>{if(e.key==='Enter')searchVideos()});document.getElementById('loginBtn').onclick=()=>document.getElementById('authModal').style.display='flex';document.getElementById('logoutBtn').onclick=logout;document.getElementById('uploadBtn').onclick=()=>document.getElementById('uploadModal').style.display='flex';
document.querySelectorAll('.sidebar-item').forEach(i=>{i.addEventListener('click',()=>{document.querySelectorAll('.sidebar-item').forEach(ii=>ii.classList.remove('active'));i.classList.add('active');currentPage=i.dataset.page;renderPage()})});
document.querySelectorAll('.close-modal').forEach(btn=>{btn.onclick=()=>{document.getElementById('authModal').style.display='none';document.getElementById('uploadModal').style.display='none';document.getElementById('editChannelModal').style.display='none'}});
let isLogin=true;document.getElementById('authSwitchBtn').onclick=()=>{isLogin=!isLogin;const t=document.getElementById('authTitle'),u=document.getElementById('authUsername');if(isLogin){t.textContent='Вход';u.style.display='none';document.getElementById('authSubmitBtn').textContent='Войти';document.getElementById('authSwitchText').textContent='Нет аккаунта?';document.getElementById('authSwitchBtn').textContent='Регистрация'}else{t.textContent='Регистрация';u.style.display='block';document.getElementById('authSubmitBtn').textContent='Зарегистрироваться';document.getElementById('authSwitchText').textContent='Уже есть аккаунт?';document.getElementById('authSwitchBtn').textContent='Войти'}};
document.getElementById('authForm').onsubmit=async(e)=>{e.preventDefault();const email=document.getElementById('authEmail').value,password=document.getElementById('authPassword').value;try{if(isLogin){await login(email,password);document.getElementById('authModal').style.display='none';renderPage()}else{const username=document.getElementById('authUsername').value;await register(username,email,password);await login(email,password);document.getElementById('authModal').style.display='none';renderPage()}}catch(err){alert('Ошибка: '+err.message)}};
loadCurrentUser().then(()=>{renderPage()});
</script>
</body>
</html>
