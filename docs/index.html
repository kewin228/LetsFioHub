<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', Arial, sans-serif; background-color: #0f0f0f; color: #f1f1f1; }

        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background-color: #0f0f0f; display: flex; align-items: center;
            justify-content: space-between; padding: 0 16px; z-index: 100;
            border-bottom: 1px solid #303030;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .menu-btn:hover { background-color: #272727; }
        .logo { display: flex; align-items: center; cursor: pointer; }
        .logo-image { height: 40px; width: auto; object-fit: contain; }
        .header-center { flex: 1; max-width: 600px; margin: 0 32px; display: flex; }
        .search-input { flex: 1; padding: 10px 16px; background-color: #121212; border: 1px solid #303030; border-radius: 40px 0 0 40px; color: white; }
        .search-btn { background-color: #222; border: 1px solid #303030; border-left: none; border-radius: 0 40px 40px 0; padding: 0 20px; cursor: pointer; color: white; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .icon-btn:hover { background-color: #272727; }

        .sidebar {
            position: fixed; top: 56px; bottom: 0; left: 0; width: 240px;
            background-color: #0f0f0f; padding: 12px 0; overflow-y: auto; z-index: 90;
            transition: transform 0.3s ease;
        }
        .sidebar.closed { transform: translateX(-240px); }
        .sidebar-item { display: flex; align-items: center; gap: 24px; padding: 8px 24px; cursor: pointer; border-radius: 10px; margin: 2px 8px; }
        .sidebar-item:hover { background-color: #272727; }
        .sidebar-item.active { background-color: #272727; }
        .sidebar-item span:first-child { font-size: 24px; width: 24px; }
        .sidebar-divider { height: 1px; background-color: #303030; margin: 12px 12px; }
        .sidebar-title { color: #aaa; font-size: 12px; padding: 8px 24px; }

        .main-content { margin-left: 240px; margin-top: 56px; padding: 24px; transition: margin-left 0.3s ease; }
        .main-content.expanded { margin-left: 0; }
        .chips { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .chip { padding: 8px 16px; background-color: #272727; border: none; border-radius: 40px; color: #f1f1f1; cursor: pointer; }
        .chip.active { background-color: #f1f1f1; color: #0f0f0f; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .video-card { cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #2a2a2a, #1a1a1a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 8px; }
        .video-details { display: flex; gap: 12px; margin-top: 8px; }
        .channel-icon { width: 36px; height: 36px; background-color: #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .video-text h3 { font-size: 16px; margin-bottom: 4px; }
        .video-text p { font-size: 14px; color: #aaa; }
        .video-stats { font-size: 12px; color: #aaa; display: flex; gap: 8px; margin-top: 4px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: #272727; padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; }
        .modal-content h2 { margin-bottom: 16px; }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0; background: #121212; border: 1px solid #3f3f3f; border-radius: 8px; color: white; }
        .modal-content button { background: #ff0000; color: white; border: none; padding: 12px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 16px; }
        .close-modal { float: right; font-size: 24px; cursor: pointer; color: #aaa; }
        .empty-state { text-align: center; padding: 60px; color: #aaa; }
        .btn-upload { background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .user-name { color: #ff0000; margin-right: 8px; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-240px); }
            .main-content { margin-left: 0; }
            .header-center { display: none; }
        }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuToggle">☰</button>
            <div class="logo" id="logoHome">
                <img src="logo.png" alt="Let's figure it out" class="logo-image">
            </div>
        </div>
        <div class="header-center">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="uploadBtn" style="display: none;">📤</button>
            <span id="userName" class="user-name"></span>
            <button class="icon-btn" id="loginBtn">👤</button>
            <button class="icon-btn" id="logoutBtn" style="display: none;">🚪</button>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-item active" data-page="home"><span>🏠</span><span>Главная</span></div>
        <div class="sidebar-item" data-page="my-channel"><span>📺</span><span>Мой канал</span></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-title">Вам может понравиться</div>
        <div class="sidebar-item"><span>🎬</span><span>Let's FioHub</span></div>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="chips" id="chipsContainer"></div>
        <div id="videosContainer"></div>
    </main>
</div>

<!-- Модальное окно входа/регистрации -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2 id="authTitle">Вход</h2>
        <form id="authForm">
            <input type="text" id="authUsername" placeholder="Имя пользователя" style="display: none;">
            <input type="email" id="authEmail" placeholder="Email" required>
            <input type="password" id="authPassword" placeholder="Пароль" required>
            <button type="submit" id="authSubmitBtn">Войти</button>
        </form>
        <p style="margin-top: 16px; text-align: center;">
            <span id="authSwitchText">Нет аккаунта?</span>
            <button id="authSwitchBtn" style="background: none; border: none; color: #ff0000; cursor: pointer;">Регистрация</button>
        </p>
    </div>
</div>

<!-- Модальное окно загрузки видео -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>📤 Загрузить видео</h2>
        <form id="uploadForm">
            <input type="text" id="videoTitle" placeholder="Название видео" required>
            <textarea id="videoDescription" rows="3" placeholder="Описание"></textarea>
            <input type="file" id="videoFile" accept="video/*" required>
            <div class="progress-bar" id="progressBar" style="display: none; height: 4px; background: #3f3f3f; margin-top: 12px;"><div class="progress-fill" style="width: 0%; height: 100%; background: #ff0000;"></div></div>
            <div id="uploadStatus"></div>
            <button type="submit">📤 Загрузить</button>
        </form>
    </div>
</div>

<script>
    const API_URL = 'https://letsfiohub-api.onrender.com';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let allVideos = [];
    let currentPage = 'home';

    // DOM элементы
    const uploadBtn = document.getElementById('uploadBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userNameSpan = document.getElementById('userName');
    const chipsContainer = document.getElementById('chipsContainer');
    const videosContainer = document.getElementById('videosContainer');

    async function loadCurrentUser() {
        if (!token) return;
        try {
            const response = await fetch(`${API_URL}/api/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                currentUser = await response.json();
                updateAuthUI();
            } else {
                logout();
            }
        } catch (err) {
            console.error('Auth error:', err);
        }
    }

    function updateAuthUI() {
        if (token && currentUser) {
            uploadBtn.style.display = 'flex';
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'flex';
            userNameSpan.textContent = currentUser.username;
        } else {
            uploadBtn.style.display = 'none';
            loginBtn.style.display = 'flex';
            logoutBtn.style.display = 'none';
            userNameSpan.textContent = '';
        }
    }

    async function register(username, email, password) {
        const response = await fetch(`${API_URL}/api/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        if (!response.ok) throw new Error(await response.text());
        return await response.json();
    }

    async function login(email, password) {
        const response = await fetch(`${API_URL}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        if (!response.ok) throw new Error('Login failed');
        const data = await response.json();
        token = data.access_token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        updateAuthUI();
        return true;
    }

    function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('token');
        updateAuthUI();
        loadAllVideos();
    }

    async function loadAllVideos() {
        try {
            const response = await fetch(`${API_URL}/api/videos`);
            const data = await response.json();
            allVideos = data.videos || [];
            renderHomePage();
        } catch (err) {
            videosContainer.innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
        }
    }

    function renderHomePage() {
        if (allVideos.length === 0) {
            videosContainer.innerHTML = '<div class="empty-state">📭 Пока нет видео</div>';
            return;
        }
        videosContainer.innerHTML = `
            <div class="video-grid">
                ${allVideos.map(video => `
                    <div class="video-card" onclick="openVideo('${video.id}')">
                        <div class="thumbnail">🎬</div>
                        <div class="video-details">
                            <div class="channel-icon">📺</div>
                            <div class="video-text">
                                <h3>${escapeHtml(video.title)}</h3>
                                <p>${escapeHtml(video.uploader_name)}</p>
                                <div class="video-stats">👁️ ${video.views} ❤️ ${video.likes}</div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function openVideo(videoId) {
        window.location.href = `/letsfiohub/watch.html?id=${videoId}`;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Модальное окно авторизации
    const authModal = document.getElementById('authModal');
    let isLoginMode = true;

    document.getElementById('loginBtn').onclick = () => authModal.style.display = 'flex';
    document.querySelector('.close-modal').onclick = () => authModal.style.display = 'none';
    window.onclick = (e) => { if (e.target === authModal) authModal.style.display = 'none'; };

    document.getElementById('authSwitchBtn').onclick = () => {
        isLoginMode = !isLoginMode;
        const title = document.getElementById('authTitle');
        const usernameField = document.getElementById('authUsername');
        if (isLoginMode) {
            title.textContent = 'Вход';
            usernameField.style.display = 'none';
            document.getElementById('authSubmitBtn').textContent = 'Войти';
            document.getElementById('authSwitchText').textContent = 'Нет аккаунта?';
            document.getElementById('authSwitchBtn').textContent = 'Регистрация';
        } else {
            title.textContent = 'Регистрация';
            usernameField.style.display = 'block';
            document.getElementById('authSubmitBtn').textContent = 'Зарегистрироваться';
            document.getElementById('authSwitchText').textContent = 'Уже есть аккаунт?';
            document.getElementById('authSwitchBtn').textContent = 'Войти';
        }
    };

    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        try {
            if (isLoginMode) {
                await login(email, password);
                authModal.style.display = 'none';
                await loadAllVideos();
            } else {
                const username = document.getElementById('authUsername').value;
                await register(username, email, password);
                await login(email, password);
                authModal.style.display = 'none';
                await loadAllVideos();
            }
        } catch (err) {
            alert('Ошибка: ' + err.message);
        }
    };

    // Загрузка видео
    const uploadModal = document.getElementById('uploadModal');
    document.getElementById('uploadBtn').onclick = () => uploadModal.style.display = 'flex';
    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        const title = document.getElementById('videoTitle').value;
        const description = document.getElementById('videoDescription').value;
        const file = document.getElementById('videoFile').files[0];
        if (!title || !file) return alert('Заполните название и выберите видео');

        const formData = new FormData();
        formData.append('title', title);
        formData.append('description', description);
        formData.append('file', file);

        document.getElementById('progressBar').style.display = 'block';
        try {
            const response = await fetch(`${API_URL}/api/videos/upload`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            if (response.ok) {
                alert('Видео загружено!');
                uploadModal.style.display = 'none';
                document.getElementById('uploadForm').reset();
                loadAllVideos();
            } else {
                alert('Ошибка загрузки');
            }
        } catch (err) {
            alert('Ошибка: ' + err.message);
        }
        document.getElementById('progressBar').style.display = 'none';
    };

    // Поиск
    document.getElementById('searchBtn').addEventListener('click', () => {
        const query = document.getElementById('searchInput').value.toLowerCase();
        if (!query) return renderHomePage();
        const filtered = allVideos.filter(v => v.title?.toLowerCase().includes(query));
        if (filtered.length === 0) {
            videosContainer.innerHTML = '<div class="empty-state">🔍 Ничего не найдено</div>';
        } else {
            videosContainer.innerHTML = `<div class="video-grid">${filtered.map(video => `
                <div class="video-card" onclick="openVideo('${video.id}')">
                    <div class="thumbnail">🎬</div>
                    <div class="video-details">
                        <div class="channel-icon">📺</div>
                        <div class="video-text">
                            <h3>${escapeHtml(video.title)}</h3>
                            <p>${escapeHtml(video.uploader_name)}</p>
                            <div class="video-stats">👁️ ${video.views} ❤️ ${video.likes}</div>
                        </div>
                    </div>
                </div>`).join('')}</div>`;
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('logoHome').addEventListener('click', () => { currentPage = 'home'; loadAllVideos(); });

    let sidebarVisible = true;
    document.getElementById('menuToggle').addEventListener('click', () => {
        sidebarVisible = !sidebarVisible;
        document.getElementById('sidebar').classList.toggle('closed', !sidebarVisible);
        document.getElementById('mainContent').classList.toggle('expanded', !sidebarVisible);
    });

    loadCurrentUser();
    loadAllVideos();
</script>

</body>
</html>
