<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub — просмотр видео</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Видео плеер */
        .video-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }
        
        video {
            width: 100%;
            display: block;
            background: #000;
        }
        
        /* Информация как на 2 скриншоте */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            color: #aaa;
            font-size: 14px;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .btn {
            background: transparent;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn:hover {
            background: #1a1a1a;
        }
        
        /* Канал */
        .channel-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid #272727;
            border-bottom: 1px solid #272727;
            margin-bottom: 20px;
        }
        
        .channel-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
        }
        
        .channel-name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .subs-count {
            color: #aaa;
            font-size: 13px;
        }
        
        .sub-btn {
            background: #cc0000;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .sub-btn.subscribed {
            background: #2a2a2a;
        }
        
        /* Описание */
        .desc {
            color: #ddd;
            line-height: 1.5;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        /* Комментарии */
        .comments-title {
            margin-bottom: 20px;
            font-size: 16px;
        }
        
        .comment-form {
            margin-bottom: 20px;
        }
        
        .comment-textarea {
            width: 100%;
            background: #121212;
            border: 1px solid #272727;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-family: inherit;
            resize: vertical;
        }
        
        .send-comment {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .comment-item {
            padding: 15px 0;
            border-bottom: 1px solid #272727;
        }
        
        .comment-author {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .comment-text {
            color: #ddd;
            font-size: 14px;
        }
        
        /* Настройки */
        .settings-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
        }
        
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 998;
            display: none;
        }
        
        .settings-panel {
            position: fixed;
            top: 0;
            right: -380px;
            width: 380px;
            height: 100%;
            background: #1e1e1e;
            z-index: 999;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 24px;
        }
        
        .settings-panel.open {
            right: 0;
        }
        
        .settings-overlay.open {
            display: block;
        }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }
        
        .settings-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        
        .setting {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        
        .setting label {
            display: block;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 14px;
        }
        
        .setting select {
            width: 100%;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
        }
        
        .setting input[type="file"] {
            width: 100%;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 6px;
            margin-top: 10px;
        }
        
        .save-btn {
            background: #3ea6ff;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }
        
        .video-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            background: #000;
            color: #666;
            font-size: 14px;
            flex-direction: column;
            gap: 15px;
        }
        
        .retry-video {
            background: #3ea6ff;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Видео -->
        <div class="video-wrapper" id="videoWrapper">
            <video id="videoPlayer" controls>
                <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
            </video>
        </div>
        
        <!-- Статистика как на скриншоте -->
        <div class="stats">
            <span>○ 0 просмотров</span>
            <span>● 0 подписей</span>
        </div>
        
        <!-- Кнопки -->
        <div class="buttons">
            <button class="btn" id="likeBtn">👍 0</button>
            <button class="btn" id="subscribeBtn">● Подписаться</button>
        </div>
        
        <!-- Канал -->
        <div class="channel-card">
            <div class="channel-left">
                <div class="avatar"></div>
                <div>
                    <div class="channel-name">Канал</div>
                    <div class="subs-count" id="subsCount">0 подписчиков</div>
                </div>
            </div>
        </div>
        
        <!-- Описание -->
        <div class="desc">
            Описание видео...
        </div>
        
        <!-- Комментарии -->
        <div class="comments-title">Комментарии 0</div>
        <div class="comment-form">
            <textarea class="comment-textarea" id="commentInput" rows="3" placeholder="Напишите комментарий..."></textarea>
            <button class="send-comment" id="sendCommentBtn">Отправить</button>
        </div>
        <div id="commentsList"></div>
    </div>
    
    <!-- Настройки -->
    <button class="settings-btn" id="openSettings">⚙️ Настройки</button>
    
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3>Настройки</h3>
            <button class="settings-close" id="closeSettings">✕</button>
        </div>
        
        <div class="setting">
            <label>🎨 Тема</label>
            <select id="theme">
                <option value="dark">Тёмная</option>
                <option value="light">Светлая</option>
            </select>
        </div>
        
        <div class="setting">
            <label>🌐 Языки интерфейса</label>
            <select id="language">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>
        
        <div class="setting">
            <label>🔤 Шрифты интерфейса</label>
            <select id="font">
                <option value="default">Профессиональный</option>
                <option value="large">Крупный</option>
            </select>
        </div>
        
        <div class="setting">
            <label>📺 Качество видео</label>
            <select id="quality">
                <option value="auto">Авто</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
            </select>
        </div>
        
        <div class="setting">
            <label>📝 Субтитры</label>
            <label><input type="checkbox" id="subtitlesToggle"> Включить</label>
            <input type="file" id="subtitleFile" accept=".vtt">
        </div>
        
        <button class="save-btn" id="saveSettings">Сохранить настройки</button>
    </div>
    
    <script>
        // Состояние
        let likes = 0;
        let isSubscribed = false;
        let subscribers = 0;
        let comments = [];
        
        // DOM элементы
        const video = document.getElementById('videoPlayer');
        const likeBtn = document.getElementById('likeBtn');
        const subscribeBtn = document.getElementById('subscribeBtn');
        const subsCountSpan = document.getElementById('subsCount');
        const commentInput = document.getElementById('commentInput');
        const sendCommentBtn = document.getElementById('sendCommentBtn');
        const commentsList = document.getElementById('commentsList');
        const commentsTitle = document.querySelector('.comments-title');
        
        // Функции
        function updateUI() {
            likeBtn.innerHTML = `👍 ${likes}`;
            subscribeBtn.innerHTML = isSubscribed ? '✓ Подписан' : '● Подписаться';
            subsCountSpan.innerText = `${subscribers} подписчиков`;
        }
        
        // Лайк
        likeBtn.onclick = () => {
            likes++;
            updateUI();
        };
        
        // Подписка
        subscribeBtn.onclick = () => {
            isSubscribed = !isSubscribed;
            if (isSubscribed) {
                subscribers++;
            } else {
                subscribers--;
            }
            updateUI();
        };
        
        // Комментарии
        function renderComments() {
            if (comments.length === 0) {
                commentsList.innerHTML = '';
                commentsTitle.innerText = 'Комментарии 0';
                return;
            }
            commentsList.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <div class="comment-author">${escapeHtml(c.author)}</div>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                </div>
            `).join('');
            commentsTitle.innerText = `Комментарии ${comments.length}`;
        }
        
        function escapeHtml(text) {
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        sendCommentBtn.onclick = () => {
            const text = commentInput.value.trim();
            if (!text) return;
            comments.push({ author: "Вы", text: text });
            renderComments();
            commentInput.value = '';
        };
        
        renderComments();
        
        // Видео ошибка
        video.onerror = () => {
            const wrapper = document.getElementById('videoWrapper');
            wrapper.innerHTML = `
                <div class="video-placeholder">
                    <span>⚠️ Загрузка...</span>
                    <div class="retry-video" onclick="location.reload()">Повторить</div>
                </div>
            `;
        };
        
        // Настройки
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const openSettings = document.getElementById('openSettings');
        const closeSettings = document.getElementById('closeSettings');
        
        openSettings.onclick = () => {
            settingsPanel.classList.add('open');
            settingsOverlay.classList.add('open');
        };
        
        function closeSettingsPanel() {
            settingsPanel.classList.remove('open');
            settingsOverlay.classList.remove('open');
        }
        
        closeSettings.onclick = closeSettingsPanel;
        settingsOverlay.onclick = closeSettingsPanel;
        
        // Субтитры
        const subtitlesToggle = document.getElementById('subtitlesToggle');
        const subtitleFile = document.getElementById('subtitleFile');
        
        subtitlesToggle.onchange = (e) => {
            if (video.textTracks.length > 0) {
                video.textTracks[0].mode = e.target.checked ? 'showing' : 'hidden';
            }
        };
        
        subtitleFile.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.name.endsWith('.vtt')) {
                const url = URL.createObjectURL(file);
                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.label = 'Uploaded';
                track.src = url;
                video.appendChild(track);
                alert('✅ Субтитры загружены');
            } else {
                alert('❌ Нужен файл .vtt');
            }
        };
        
        // Тема
        const themeSelect = document.getElementById('theme');
        themeSelect.onchange = (e) => {
            if (e.target.value === 'light') {
                document.body.style.background = '#fff';
                document.body.style.color = '#000';
            } else {
                document.body.style.background = '#0a0a0a';
                document.body.style.color = '#fff';
            }
            localStorage.setItem('theme', e.target.value);
        };
        
        // Шрифты
        const fontSelect = document.getElementById('font');
        fontSelect.onchange = (e) => {
            if (e.target.value === 'large') document.body.style.fontSize = '18px';
            else document.body.style.fontSize = '14px';
            localStorage.setItem('font', e.target.value);
        };
        
        // Сохранение
        document.getElementById('saveSettings').onclick = () => {
            localStorage.setItem('theme', themeSelect.value);
            localStorage.setItem('language', document.getElementById('language').value);
            localStorage.setItem('font', fontSelect.value);
            localStorage.setItem('quality', document.getElementById('quality').value);
            localStorage.setItem('subtitles', subtitlesToggle.checked);
            alert('✅ Настройки сохранены');
            closeSettingsPanel();
        };
        
        // Загрузка сохранённых настроек
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) { themeSelect.value = savedTheme; themeSelect.dispatchEvent(new Event('change')); }
        const savedFont = localStorage.getItem('font');
        if (savedFont) { fontSelect.value = savedFont; fontSelect.dispatchEvent(new Event('change')); }
        const savedSubtitles = localStorage.getItem('subtitles') === 'true';
        if (savedSubtitles) subtitlesToggle.checked = true;
    </script>
</body>
</html>
