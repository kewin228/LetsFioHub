<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub — просмотр видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0f0f0f; border-bottom: 1px solid #272727; margin-bottom: 30px; }
        .logo { font-size: 20px; font-weight: bold; color: #fff; text-decoration: none; }
        .video-wrapper { background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        video { width: 100%; display: block; }
        .video-info-card { background: #0f0f0f; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 15px; color: #aaa; font-size: 14px; }
        .action-buttons { display: flex; gap: 15px; }
        .action-btn { background: #1a1a1a; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .channel-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #0f0f0f; border-radius: 12px; margin-bottom: 20px; }
        .channel-info { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .channel-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; }
        .channel-name { font-size: 18px; font-weight: 600; }
        .channel-subscribers { color: #aaa; font-size: 14px; }
        .subscribe-btn { background: #cc0000; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .description { background: #0f0f0f; padding: 16px; border-radius: 12px; margin-bottom: 30px; }
        .comments-section { background: #0f0f0f; border-radius: 12px; padding: 16px; margin-top: 20px; }
        .comment-form textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .comment { padding: 12px 0; border-bottom: 1px solid #272727; }
        .settings-trigger { position: fixed; bottom: 20px; right: 20px; background: #1a1a1a; color: #fff; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; z-index: 100; }
        .settings-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 998; display: none; }
        .settings-panel { position: fixed; top: 0; right: -400px; width: 380px; height: 100%; background: #1e1e1e; z-index: 999; transition: right 0.3s ease; overflow-y: auto; padding: 24px; }
        .settings-panel.active { right: 0; }
        .settings-overlay.active { display: block; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .close-settings { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .setting-item { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .setting-item label { display: block; margin-bottom: 10px; color: #aaa; font-size: 14px; }
        .setting-item select { width: 100%; background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; }
        .save-settings { background: #3ea6ff; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; }
        .loading { text-align: center; padding: 50px; color: #aaa; }
        .error { text-align: center; padding: 50px; color: #ff4444; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="/" class="logo">Let's FioHub</a>
    </div>
    
    <div class="container" id="app">
        <div class="loading">⏳ Загрузка видео...</div>
    </div>
    
    <button class="settings-trigger" id="openSettingsBtn">⚙️ Настройки</button>
    
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3>Настройки</h3>
            <button class="close-settings" id="closeSettingsBtn">✕</button>
        </div>
        <div class="setting-item">
            <label>🎨 Тема</label>
            <select id="themeSelect"><option value="dark">Тёмная</option><option value="light">Светлая</option></select>
        </div>
        <div class="setting-item">
            <label>🌐 Языки интерфейса</label>
            <select id="languageSelect"><option value="ru">Русский</option><option value="en">English</option></select>
        </div>
        <div class="setting-item">
            <label>🔤 Шрифты интерфейса</label>
            <select id="fontSelect"><option value="default">Профессиональный</option><option value="large">Крупный</option></select>
        </div>
        <div class="setting-item">
            <label>📺 Качество видео</label>
            <select id="qualitySelect"><option value="auto">Авто</option><option value="1080p">1080p</option><option value="720p">720p</option></select>
        </div>
        <div class="setting-item">
            <label>📝 Субтитры</label>
            <label><input type="checkbox" id="subtitlesToggle"> Включить</label>
            <div style="margin-top: 10px;"><input type="file" id="subtitleUpload" accept=".vtt"></div>
        </div>
        <button class="save-settings" id="saveSettingsBtn">Сохранить настройки</button>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        
        let currentVideo = null;
        let comments = [];
        
        async function loadVideo() {
            if (!videoId) {
                document.getElementById('app').innerHTML = '<div class="error">❌ Видео не найдено. Укажите ID видео</div>';
                return;
            }
            
            try {
                // Пробуем получить информацию о видео
                const response = await fetch(`/api/video/${videoId}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                currentVideo = await response.json();
                renderVideo();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        ❌ Ошибка загрузки видео<br>
                        <small>ID: ${videoId}</small><br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }
        
        function renderVideo() {
            const html = `
                <div class="video-wrapper">
                    <video id="videoPlayer" controls autoplay>
                        <source src="/api/video/stream/${videoId}" type="video/mp4">
                        Ваш браузер не поддерживает видео
                    </video>
                </div>
                <div class="video-info-card">
                    <div class="stats-row">
                        <span>○ <span id="viewCount">${currentVideo?.views || 0}</span> просмотров</span>
                        <span>● <span id="subCount">${currentVideo?.subscribers || 0}</span> подписей</span>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" id="likeBtn">👍 <span id="likeCount">${currentVideo?.likes || 0}</span></button>
                        <button class="action-btn" id="shareBtn">❤️ Поделиться</button>
                    </div>
                </div>
                <div class="channel-row">
                    <div class="channel-info">
                        <div class="channel-avatar"></div>
                        <div>
                            <div class="channel-name">${escapeHtml(currentVideo?.user_id || 'Канал')}</div>
                            <div class="channel-subscribers">${currentVideo?.subscribers || 0} подписчиков</div>
                        </div>
                    </div>
                    <button class="subscribe-btn" id="subscribeBtn">🔔 Подписаться</button>
                </div>
                <div class="description">${escapeHtml(currentVideo?.description || 'Описание отсутствует')}</div>
                <div class="comments-section">
                    <h3>Комментарии <span id="commentsCount">${comments.length}</span></h3>
                    <div class="comment-form">
                        <textarea id="commentText" rows="3" placeholder="Напишите комментарий..."></textarea>
                        <button class="action-btn" id="submitCommentBtn">Отправить</button>
                    </div>
                    <div id="commentsList"></div>
                </div>
            `;
            
            document.getElementById('app').innerHTML = html;
            
            document.getElementById('likeBtn')?.addEventListener('click', () => likeVideo());
            document.getElementById('shareBtn')?.addEventListener('click', () => shareVideo());
            document.getElementById('subscribeBtn')?.addEventListener('click', () => toggleSubscribe());
            document.getElementById('submitCommentBtn')?.addEventListener('click', () => addComment());
            
            // Обработка ошибки видео
            const video = document.getElementById('videoPlayer');
            if (video) {
                video.onerror = () => {
                    console.error('Ошибка воспроизведения видео');
                    video.poster = '';
                };
            }
        }
        
        function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        async function likeVideo() { alert('Лайк поставлен'); }
        async function shareVideo() { await navigator.clipboard.writeText(window.location.href); alert('Ссылка скопирована!'); }
        async function toggleSubscribe() { alert('Подписка оформлена'); }
        async function addComment() { alert('Комментарий добавлен'); }
        
        // Настройки
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsOverlay = document.getElementById('settingsOverlay');
        document.getElementById('openSettingsBtn').onclick = () => { settingsPanel.classList.add('active'); settingsOverlay.classList.add('active'); };
        document.getElementById('closeSettingsBtn').onclick = () => { settingsPanel.classList.remove('active'); settingsOverlay.classList.remove('active'); };
        settingsOverlay.onclick = () => { settingsPanel.classList.remove('active'); settingsOverlay.classList.remove('active'); };
        
        document.getElementById('subtitlesToggle')?.addEventListener('change', function(e) {
            const video = document.getElementById('videoPlayer');
            if (video && video.textTracks.length) video.textTracks[0].mode = e.target.checked ? 'showing' : 'hidden';
        });
        
        document.getElementById('subtitleUpload')?.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('subtitles', file);
            formData.append('videoId', videoId);
            await fetch('/api/upload-subtitles', { method: 'POST', body: formData });
            alert('Субтитры загружены');
        });
        
        // Загрузка сохранённых настроек
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) document.getElementById('themeSelect').value = savedTheme;
        
        document.getElementById('saveSettingsBtn').onclick = () => {
            localStorage.setItem('theme', document.getElementById('themeSelect').value);
            alert('Настройки сохранены');
            settingsPanel.classList.remove('active');
            settingsOverlay.classList.remove('active');
        };
        
        loadVideo();
    </script>
</body>
</html>
