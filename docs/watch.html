<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub - Просмотр</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #0f0f0f; color: white; }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #3f3f3f;
        }
        .logo {
            display: flex;
            align-items: baseline;
            gap: 4px;
            text-decoration: none;
        }
        .logo-lets { font-size: 1rem; font-weight: 600; color: white; }
        .logo-figure { font-size: 0.9rem; color: #aaaaaa; }
        .logo-it { font-size: 0.85rem; color: #888888; }
        .logo-fiohub { font-size: 0.7rem; color: #ff0000; margin-left: 4px; }
        .back-link {
            margin-left: 24px;
            color: #aaaaaa;
            text-decoration: none;
        }
        .back-link:hover { color: white; }
        
        .container {
            max-width: 1200px;
            margin: 80px auto 0;
            padding: 0 16px;
        }
        .video-player {
            background: black;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .video-player video { width: 100%; max-height: 70vh; }
        .watch-title { font-size: 1.3rem; margin-bottom: 12px; }
        .watch-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid #3f3f3f;
            border-bottom: 1px solid #3f3f3f;
        }
        .like-btn {
            background: #272727;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .like-btn:hover { background: #3f3f3f; }
        .video-description {
            padding: 16px;
            background: #272727;
            border-radius: 12px;
            margin-top: 16px;
        }
        .loading { text-align: center; padding: 60px; color: #aaaaaa; }
    </style>
</head>
<body>

<header class="header">
    <a href="/letsfiohub" class="logo">
        <span class="logo-lets">Let's</span>
        <span class="logo-figure">figure</span>
        <span class="logo-it">it out</span>
        <span class="logo-fiohub">FioHub</span>
    </a>
    <a href="/letsfiohub" class="back-link">← На главную</a>
</header>

<main class="container" id="app">
    <div class="loading">⏳ Загрузка видео...</div>
</main>

<script>
    const API_URL = 'https://letsfiohub-api.onrender.com';
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');
    
    async function loadVideo() {
        if (!videoId) {
            document.getElementById('app').innerHTML = '<div class="loading">❌ Видео не найдено</div>';
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/v1/videos/${videoId}`);
            const video = await response.json();
            
            document.getElementById('app').innerHTML = `
                <div class="video-player">
                    <video controls autoplay>
                        <source src="${API_URL}/api/v1/videos/${videoId}/stream">
                    </video>
                </div>
                <h1 class="watch-title">${escapeHtml(video.title) || 'Без названия'}</h1>
                <div class="watch-meta">
                    <div>👁️ ${formatViews(video.views || 0)} просмотров</div>
                    <button class="like-btn" onclick="likeVideo()">👍 ${video.likes || 0}</button>
                </div>
                <div class="video-description">
                    <p>${escapeHtml(video.description) || 'Нет описания'}</p>
                </div>
            `;
        } catch (err) {
            document.getElementById('app').innerHTML = '<div class="loading">❌ Ошибка загрузки видео</div>';
        }
    }
    
    function formatViews(views) {
        if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M';
        if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
        return views;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function likeVideo() {
        try {
            await fetch(`${API_URL}/api/v1/videos/${videoId}/like?user_id=1`, { method: 'POST' });
            loadVideo();
        } catch (err) {
            console.error('Error liking video:', err);
        }
    }
    
    loadVideo();
</script>

</body>
</html>
