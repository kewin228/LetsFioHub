<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub — канал</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #f1f1f1; }
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: #0f0f0f; display: flex; align-items: center;
            justify-content: space-between; padding: 0 16px; z-index: 100;
            border-bottom: 1px solid #303030;
        }
        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo img { height: 32px; }
        .back-link { margin-left: 24px; color: #aaa; text-decoration: none; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .icon-btn:hover { background: #272727; }
        
        .container { max-width: 1200px; margin: 80px auto 0; padding: 0 24px; }
        .channel-cover {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, #ff0000, #cc0000, #667eea, #764ba2);
            background-size: 200% 200%;
            animation: gradient 4s ease infinite;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .channel-header { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
        .channel-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #ff0000, #cc0000); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .channel-info { flex: 1; }
        .channel-info h1 { font-size: 24px; margin-bottom: 8px; }
        .channel-stats { color: #aaa; font-size: 14px; margin-bottom: 8px; }
        
        .subscribe-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .subscribe-btn.subscribed { background: #272727; }
        
        .tabs { display: flex; gap: 24px; margin: 24px 0; border-bottom: 1px solid #303030; }
        .tab { padding: 12px 0; cursor: pointer; color: #aaa; }
        .tab.active { color: white; border-bottom: 2px solid #ff0000; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .video-card { cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #2a2a2a, #1a1a1a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 12px; }
        .video-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .video-stats { font-size: 13px; color: #aaa; }
        .empty-state { text-align: center; padding: 60px; color: #aaa; }
        
        @media (max-width: 768px) { .channel-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<header class="header">
    <div style="display: flex; align-items: center;">
        <div class="logo" onclick="window.location.href='/letsfiohub'">
            <img src="logo.png" alt="Logo">
            <span>Let's FioHub</span>
        </div>
        <a href="/letsfiohub" class="back-link">← На главную</a>
    </div>
    <button class="icon-btn" id="settingsBtn">⚙️</button>
</header>

<main class="container" id="app">
    <div class="empty-state">⏳ Загрузка канала...</div>
</main>

<script>
    const API_URL = 'https://letsfiohub-api.onrender.com';
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('username');
    let token = localStorage.getItem('token');
    let currentUser = null;
    let channelData = null;
    let currentTab = 'videos';
    let isSubscribed = false;
    let subscriberCount = 0;
    let channelUserId = null;

    async function loadCurrentUser() {
        if (!token) return;
        try {
            const res = await fetch(`${API_URL}/api/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) currentUser = await res.json();
            else token = null;
        } catch(e) {}
    }

    async function loadChannel() {
        if (!username) {
            document.getElementById('app').innerHTML = '<div class="empty-state">❌ Канал не найден</div>';
            return;
        }
        try {
            // Получаем пользователя по username
            const userRes = await fetch(`${API_URL}/api/users?username=${username}`);
            let userId = null;
            
            // Альтернативный способ: получаем через канал
            const response = await fetch(`${API_URL}/api/channel/${username}`);
            if (response.ok) {
                channelData = await response.json();
                subscriberCount = channelData.subscribers_count || 0;
                
                // Получаем ID пользователя через отдельный запрос
                const usersRes = await fetch(`${API_URL}/api/users`);
                if (usersRes.ok) {
                    const users = await usersRes.json();
                    for (let u of users) {
                        if (u.username === username) {
                            channelUserId = u.id;
                            break;
                        }
                    }
                }
                
                if (token && currentUser && currentUser.username !== username && channelUserId) {
                    await checkSubscribed();
                }
                renderPage();
            } else {
                document.getElementById('app').innerHTML = '<div class="empty-state">❌ Канал не найден</div>';
            }
        } catch (err) {
            console.error("Error loading channel:", err);
            document.getElementById('app').innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
        }
    }

    async function checkSubscribed() {
        if (!currentUser || currentUser.username === username) return;
        if (!channelUserId) {
            console.error("No channelUserId");
            return;
        }
        try {
            const res = await fetch(`${API_URL}/api/is_subscribed/${channelUserId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                isSubscribed = data.subscribed;
                console.log("Subscribed status:", isSubscribed);
            }
        } catch(e) {
            console.error("Check subscribed error:", e);
        }
    }

    async function subscribeToChannel() {
        console.log("Subscribe clicked");
        if (!token) { alert('Войдите, чтобы подписаться'); return; }
        if (currentUser && currentUser.username === username) {
            alert('Нельзя подписаться на самого себя');
            return;
        }
        if (!channelUserId) {
            alert('Ошибка: ID канала не найден');
            return;
        }
        
        console.log("Channel ID:", channelUserId);
        
        try {
            const method = isSubscribed ? 'DELETE' : 'POST';
            const res = await fetch(`${API_URL}/api/subscribe/${channelUserId}`, {
                method: method,
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            console.log("Response status:", res.status);
            
            if (res.ok) {
                const data = await res.json();
                isSubscribed = !isSubscribed;
                subscriberCount = data.subscribers_count || subscriberCount;
                renderPage();
                alert(isSubscribed ? 'Вы подписались!' : 'Вы отписались');
            } else {
                let errorMsg = 'Ошибка подписки';
                try {
                    const error = await res.json();
                    errorMsg = error.detail || error.message || JSON.stringify(error);
                } catch(e) {}
                alert('Ошибка: ' + errorMsg);
            }
        } catch(err) {
            console.error("Subscribe error:", err);
            alert('Ошибка: ' + err.message);
        }
    }

    function formatViews(views) {
        if (views >= 1000000) return (views/1000000).toFixed(1) + 'M';
        if (views >= 1000) return (views/1000).toFixed(1) + 'K';
        return views;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderVideos(videos) {
        if (!videos || videos.length === 0) return '<div class="empty-state">📭 На канале пока нет видео</div>';
        return `<div class="video-grid">${videos.map(v => `
            <div class="video-card" onclick="openVideo('${v.id}')">
                <div class="thumbnail">🎬</div>
                <div class="video-title">${escapeHtml(v.title)}</div>
                <div class="video-stats">👁️ ${formatViews(v.views)} просмотров</div>
            </div>
        `).join('')}</div>`;
    }

    function renderQuickVideos(videos) {
        if (!videos || videos.length === 0) return '';
        return `<div style="margin-top: 32px;"><h2 style="margin-bottom: 16px;">⚡ Короткие видео</h2>
            <div class="video-grid">${videos.map(v => `
                <div class="video-card" onclick="openVideo('${v.id}')">
                    <div class="thumbnail">⚡</div>
                    <div class="video-title">${escapeHtml(v.title)}</div>
                    <div class="video-stats">👁️ ${formatViews(v.views)} просмотров</div>
                </div>
            `).join('')}</div></div>`;
    }

    function renderPage() {
        if (!channelData) return;
        
        const isOwnChannel = currentUser && currentUser.username === username;
        
        document.getElementById('app').innerHTML = `
            <div class="channel-cover"></div>
            <div class="channel-header">
                <div class="channel-avatar">📺</div>
                <div class="channel-info">
                    <h1>${escapeHtml(channelData.channel_name)}</h1>
                    <div class="channel-stats">👥 ${subscriberCount} подписчиков</div>
                    <div class="channel-description">${escapeHtml(channelData.channel_description || 'Нет описания')}</div>
                </div>
                ${!isOwnChannel && token ? `<button class="subscribe-btn ${isSubscribed ? 'subscribed' : ''}" id="subscribeBtn">${isSubscribed ? '✓ Вы подписаны' : '🔔 Подписаться'}</button>` : ''}
                ${!token ? `<button class="subscribe-btn" id="loginSubscribeBtn">🔔 Подписаться</button>` : ''}
            </div>
            <div class="tabs">
                <div class="tab ${currentTab === 'videos' ? 'active' : ''}" data-tab="videos">📹 Видео</div>
                <div class="tab ${currentTab === 'quick' ? 'active' : ''}" data-tab="quick">⚡ Quick</div>
            </div>
            <div id="tabContent"></div>
        `;
        
        const tabContent = document.getElementById('tabContent');
        tabContent.innerHTML = currentTab === 'videos' ? renderVideos(channelData.videos) : renderQuickVideos(channelData.quick_videos);
        
        if (!isOwnChannel && token) {
            const btn = document.getElementById('subscribeBtn');
            if (btn) btn.addEventListener('click', subscribeToChannel);
        }
        if (!token) {
            const btn = document.getElementById('loginSubscribeBtn');
            if (btn) {
                btn.addEventListener('click', () => {
                    alert('Войдите, чтобы подписаться');
                });
            }
        }
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentTab = tab.dataset.tab;
                renderPage();
            });
        });
    }

    window.openVideo = function(id) {
        window.location.href = `/letsfiohub/watch.html?id=${id}`;
    }

    document.getElementById('settingsBtn').onclick = () => {
        window.location.href = '/letsfiohub';
    };

    loadCurrentUser().then(() => loadChannel());
</script>
</body>
</html>
