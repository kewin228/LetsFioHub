<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's FioHub — канал</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #f1f1f1;
        }
        body.light { background: #f9f9f9; color: #0f0f0f; }
        
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: #0f0f0f; display: flex; align-items: center;
            justify-content: space-between; padding: 0 16px; z-index: 100;
            border-bottom: 1px solid #303030;
        }
        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo img { height: 32px; }
        .back-link { margin-left: 24px; color: #aaa; text-decoration: none; }
        .back-link:hover { color: white; }
        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: #272727; }
        
        .container { max-width: 1200px; margin: 80px auto 0; padding: 0 24px; }
        .channel-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #ff0000, #cc0000, #667eea, #764ba2);
            background-size: 200% 200%;
            animation: gradient 4s ease infinite;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .channel-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .channel-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .channel-info { flex: 1; }
        .channel-info h1 { font-size: 24px; margin-bottom: 8px; }
        .channel-stats { color: #aaa; font-size: 14px; margin-bottom: 8px; }
        .channel-description { color: #aaa; font-size: 14px; }
        
        .subscribe-channel-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .subscribe-channel-btn.subscribed { background: #272727; }
        .subscribe-channel-btn:hover { transform: scale(1.02); }
        
        .tabs { display: flex; gap: 24px; margin: 24px 0; border-bottom: 1px solid #303030; }
        .tab { padding: 12px 0; cursor: pointer; font-size: 16px; font-weight: 500; color: #aaa; }
        .tab.active { color: white; border-bottom: 2px solid #ff0000; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-4px); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #2a2a2a, #1a1a1a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 12px; }
        .video-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .video-stats { font-size: 13px; color: #aaa; }
        
        .empty-state { text-align: center; padding: 60px; color: #aaa; }
        
        @media (max-width: 768px) { .channel-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<header class="header">
    <div style="display: flex; align-items: center;">
        <div class="logo" onclick="window.location.href='/letsfiohub'">
            <img src="logo.png" alt="Logo">
            <span>Let's FioHub</span>
        </div>
        <a href="/letsfiohub" class="back-link">← На главную</a>
    </div>
    <button class="icon-btn" id="settingsBtn">⚙️</button>
</header>

<main class="container" id="app">
    <div class="empty-state">⏳ Загрузка канала...</div>
</main>

<script>
    const API_URL = 'https://letsfiohub-api.onrender.com';
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('username');
    let token = localStorage.getItem('token');
    let currentUser = null;
    let channelData = null;
    let currentTab = 'videos';
    let isSubscribed = false;
    let subscriberCount = 0;

    async function loadCurrentUser() {
        if (!token) return;
        try {
            const res = await fetch(`${API_URL}/api/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) currentUser = await res.json();
            else token = null;
        } catch(e) {}
    }

    async function loadChannel() {
        if (!username) {
            document.getElementById('app').innerHTML = '<div class="empty-state">❌ Канал не найден</div>';
            return;
        }
        try {
            const response = await fetch(`${API_URL}/api/channel/${username}`);
            if (response.ok) {
                channelData = await response.json();
                subscriberCount = channelData.subscribers_count || 0;
                if (token && currentUser && currentUser.username !== username) {
                    await checkSubscribed();
                }
                renderPage();
            } else {
                document.getElementById('app').innerHTML = '<div class="empty-state">❌ Канал не найден</div>';
            }
        } catch (err) {
            document.getElementById('app').innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
        }
    }

    async function checkSubscribed() {
        if (!currentUser || currentUser.username === username) return;
        try {
            const res = await fetch(`${API_URL}/api/is_subscribed/${channelData.id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                isSubscribed = data.subscribed;
                console.log("Check subscribed result:", isSubscribed);
            }
        } catch(e) {
            console.error("Check subscribed error:", e);
        }
    }

    async function subscribeToChannel() {
        console.log("Channel subscribe clicked");
        if (!token) { alert('Войдите, чтобы подписаться'); return; }
        if (currentUser && currentUser.username === username) {
            alert('Нельзя подписаться на самого себя');
            return;
        }
        try {
            const method = isSubscribed ? 'DELETE' : 'POST';
            console.log("Method:", method);
            const res = await fetch(`${API_URL}/api/subscribe/${channelData.id}`, {
                method: method,
                headers: { 'Authorization': `Bearer ${token}` }
            });
            console.log("Response status:", res.status);
            if (res.ok) {
                const data = await res.json();
                isSubscribed = !isSubscribed;
                subscriberCount = data.subscribers_count;
                console.log("New subscription status:", isSubscribed, "Subscribers:", subscriberCount);
                updateSubscribeButton();
                alert(isSubscribed ? 'Вы подписались!' : 'Вы отписались');
                // Принудительно обновляем страницу, чтобы синхронизировать
                setTimeout(() => {
                    location.reload();
                }, 500);
            } else {
                const error = await res.json();
                alert('Ошибка: ' + (error.detail || 'Неизвестная ошибка'));
            }
        } catch(err) {
            console.error("Subscribe error:", err);
            alert('Ошибка: ' + err.message);
        }
    }

    function updateSubscribeButton() {
        const subBtn = document.getElementById('subscribeChannelBtn');
        const statsSpan = document.getElementById('channelStats');
        console.log("Updating button, isSubscribed:", isSubscribed);
        if (subBtn) {
            subBtn.textContent = isSubscribed ? '✓ Вы подписаны' : '🔔 Подписаться';
            if (isSubscribed) subBtn.classList.add('subscribed');
            else subBtn.classList.remove('subscribed');
        }
        if (statsSpan) statsSpan.textContent = `👥 ${subscriberCount} подписчиков`;
    }

    function formatViews(views) {
        if (views >= 1000000) return (views/1000000).toFixed(1) + 'M';
        if (views >= 1000) return (views/1000).toFixed(1) + 'K';
        return views;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderVideos(videos) {
        if (!videos || videos.length === 0) {
            return '<div class="empty-state">📭 На канале пока нет видео</div>';
        }
        return `
            <div class="video-grid">
                ${videos.map(v => `
                    <div class="video-card" onclick="openVideo('${v.id}')">
                        <div class="thumbnail">🎬</div>
                        <div class="video-title">${escapeHtml(v.title)}</div>
                        <div class="video-stats">👁️ ${formatViews(v.views)} просмотров</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderQuickVideos(videos) {
        if (!videos || videos.length === 0) return '';
        return `
            <div style="margin-top: 32px;">
                <h2 style="margin-bottom: 16px;">⚡ Короткие видео</h2>
                <div class="video-grid">
                    ${videos.map(v => `
                        <div class="video-card" onclick="openVideo('${v.id}')">
                            <div class="thumbnail">⚡</div>
                            <div class="video-title">${escapeHtml(v.title)}</div>
                            <div class="video-stats">👁️ ${formatViews(v.views)} просмотров</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function renderPage() {
        if (!channelData) return;
        
        const isOwnChannel = currentUser && currentUser.username === username;
        
        document.getElementById('app').innerHTML = `
            <div class="channel-cover"></div>
            <div class="channel-header">
                <div class="channel-avatar">📺</div>
                <div class="channel-info">
                    <h1>${escapeHtml(channelData.channel_name)}</h1>
                    <div class="channel-stats" id="channelStats">👥 ${subscriberCount} подписчиков</div>
                    <div class="channel-description">${escapeHtml(channelData.channel_description || 'Нет описания')}</div>
                </div>
                ${!isOwnChannel && token ? `<button class="subscribe-channel-btn ${isSubscribed ? 'subscribed' : ''}" id="subscribeChannelBtn">${isSubscribed ? '✓ Вы подписаны' : '🔔 Подписаться'}</button>` : ''}
                ${!token ? `<button class="subscribe-channel-btn" id="loginToSubscribeBtn">🔔 Подписаться</button>` : ''}
            </div>
            <div class="tabs">
                <div class="tab ${currentTab === 'videos' ? 'active' : ''}" data-tab="videos">📹 Видео</div>
                <div class="tab ${currentTab === 'quick' ? 'active' : ''}" data-tab="quick">⚡ Quick</div>
            </div>
            <div id="tabContent"></div>
        `;
        
        const tabContent = document.getElementById('tabContent');
        if (currentTab === 'videos') {
            tabContent.innerHTML = renderVideos(channelData.videos);
        } else {
            tabContent.innerHTML = renderQuickVideos(channelData.quick_videos);
        }
        
        if (!isOwnChannel && token) {
            const btn = document.getElementById('subscribeChannelBtn');
            if (btn) {
                btn.addEventListener('click', subscribeToChannel);
            }
        }
        if (!token) {
            const btn = document.getElementById('loginToSubscribeBtn');
            if (btn) {
                btn.addEventListener('click', () => {
                    alert('Войдите, чтобы подписаться на канал');
                });
            }
        }
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentTab = tab.dataset.tab;
                renderPage();
            });
        });
    }

    window.openVideo = function(id) {
        window.location.href = `/letsfiohub/watch.html?id=${id}`;
    }

    // Настройки (переход на главную)
    document.getElementById('settingsBtn').onclick = () => {
        window.location.href = '/letsfiohub';
    };

    async function init() {
        await loadCurrentUser();
        await loadChannel();
    }
    
    init();
</script>
</body>
</html>
